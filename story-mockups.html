<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC Movie — Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#f3ecde; --sub:rgba(243,236,222,.62); --line:rgba(243,236,222,.14);
         --green:#37b56a; --orange:#ef8a34; --blue:#22b0f0; --violet:#8b6dff; --gold:#e9c46a; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; background:#050608; overflow:hidden; font-family:'Barlow',system-ui,sans-serif; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{ width:1280px; height:720px; position:relative; overflow:hidden; transform-origin:center; border-radius:2px;
          background:radial-gradient(120% 100% at 50% 0%, #1a2030 0%, #10131c 55%, #0a0c12 100%); box-shadow:0 40px 120px rgba(0,0,0,.7); }
  .slide{ position:absolute; inset:0; opacity:0; pointer-events:none; display:flex; }
  .slide.on{ opacity:1; pointer-events:auto; }
  .cond{ font-family:'Barlow Condensed',sans-serif; }
  .kick{ font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--sub); }
  .flag{ border-radius:3px; box-shadow:0 2px 8px rgba(0,0,0,.5); object-fit:cover; }
  .grad-bottom{ position:absolute; left:0; right:0; bottom:0; height:55%; background:linear-gradient(180deg,transparent,rgba(6,8,12,.94)); }

  /* HUD */
  #hud{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:14px;
        background:rgba(12,14,20,.9); border:1px solid rgba(255,255,255,.1); border-radius:40px; padding:8px 10px; z-index:50; font-family:'Barlow Condensed',sans-serif; }
  #hud button{ background:transparent; border:none; color:#e9e3d5; cursor:pointer; font:inherit; font-size:16px; padding:6px 10px; border-radius:20px; }
  #hud button:hover{ background:rgba(255,255,255,.1); }
  #label{ min-width:210px; text-align:center; font-weight:700; letter-spacing:.6px; text-transform:uppercase; font-size:13px; color:#e9e3d5; }
  #idx{ color:var(--gold); }
  .dots{ display:flex; gap:5px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.28); cursor:pointer; }
  .dot.on{ background:var(--gold); }

  /* generic pieces */
  .badge{ display:inline-flex; align-items:center; gap:8px; font-family:'Barlow Condensed',sans-serif; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; font-size:14px; padding:6px 13px; border-radius:6px; color:#fff; }
  .pill{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:30px; padding:5px 13px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.4px; color:var(--sub); font-size:14px; }
</style>
</head>
<body>
<div id="wrap"><div id="stage"></div></div>
<div id="hud">
  <button onclick="go(-1)">◀ Prev</button>
  <div id="label"></div>
  <button onclick="go(1)">Next ▶</button>
  <div class="dots" id="dots"></div>
</div>
<script>
const P = {
  Messi:{pic:'https://digitalhub.fifa.com/transform/19823774-fac0-485a-8a8f-572e7324c6c2/MESSI-Lionel_229397', iso:'ar', team:'Argentina', code:'ARG'},
  Mbappe:{pic:'https://digitalhub.fifa.com/transform/66f6087d-9563-4644-8f10-5614ef6e1e51/MBAPPE-Kylian_389867', iso:'fr', team:'France', code:'FRA'},
  Olise:{pic:'https://digitalhub.fifa.com/transform/979cc206-e23b-4b21-8d40-843607ba8964/OLISE-Michael_485655', iso:'fr', team:'France', code:'FRA'},
  Bellingham:{pic:'https://digitalhub.fifa.com/transform/d711b37f-ec06-4ea7-bb52-50ba0a42ef67/BELLINGHAM-Jude_448202', iso:'gb-eng', team:'England', code:'ENG'},
  Costa:{pic:'https://digitalhub.fifa.com/transform/7c3541e5-a8cb-458c-b368-7f57c1b5ae03/DIOGO-COSTA_403001', iso:'pt', team:'Portugal', code:'POR'}
};
const flag = (iso,w=320)=> 'https://flagcdn.com/w'+w+'/'+iso+'.png';
const photo = (p,w=620)=> p.pic + '?&io=transform:fit,width:'+w+'&quality=90';
const ALLISO = {"BRA":"br","JPN":"jp","CIV":"ci","NOR":"no","MEX":"mx","ECU":"ec","ENG":"gb-eng","COD":"cd","ARG":"ar","CPV":"cv","AUS":"au","EGY":"eg","SUI":"ch","ALG":"dz","COL":"co","GHA":"gh","SEN":"sn","BEL":"be","BIH":"ba","USA":"us","AUT":"at","ESP":"es","CRO":"hr","POR":"pt","MAR":"ma","NED":"nl","CAN":"ca","RSA":"za","SWE":"se","FRA":"fr","PAR":"py","GER":"de","KOR":"kr","CZE":"cz","QAT":"qa","SCO":"gb-sct","HAI":"ht","TUR":"tr","CUW":"cw","TUN":"tn","IRN":"ir","NZL":"nz","URU":"uy","KSA":"sa","IRQ":"iq","JOR":"jo","UZB":"uz","PAN":"pa"};

// ---------- slide builders ----------
const heroPlayer = (p,{badge,badgeColor,tag,big,bigLabel})=>`
  <div style="position:absolute;inset:0;background:radial-gradient(90% 90% at 78% 35%, ${badgeColor}22, transparent 60%);"></div>
  <img src="${photo(p,720)}" style="position:absolute;right:60px;bottom:0;height:104%;object-fit:contain;object-position:bottom;filter:drop-shadow(0 20px 40px rgba(0,0,0,.6));">
  <div class="grad-bottom"></div>
  <div style="position:absolute;left:70px;top:64px;">
    <span class="badge" style="background:${badgeColor};box-shadow:0 6px 20px ${badgeColor}66;">${badge}</span>
  </div>
  <div style="position:absolute;right:70px;top:60px;text-align:right;line-height:.82;text-shadow:0 3px 16px rgba(0,0,0,.6);">
    <div class="cond" style="font-weight:800;font-size:150px;color:${badgeColor};">${big}</div>
    <div class="cond" style="font-weight:700;font-size:22px;letter-spacing:3px;color:${badgeColor};text-transform:uppercase;">${bigLabel}</div>
  </div>
  <div style="position:absolute;left:70px;bottom:70px;">
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="cond" style="font-weight:800;font-size:74px;color:var(--ink);line-height:.9;">${p.name||''}</div>
      <img class="flag" src="${flag(p.iso)}" style="height:44px;">
    </div>
    <div class="cond" style="font-weight:700;font-size:20px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;margin-top:8px;">${tag}</div>
  </div>`;

function teamCol(code, name, form, side){
  return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <img class="flag" src="${flag(ALLISO[code],640)}" style="width:200px;height:132px;">
    <div class="cond" style="font-weight:800;font-size:56px;color:var(--ink);letter-spacing:1px;text-align:center;line-height:.95;">${name}</div>
    <div class="pill">${form}</div>
  </div>`;
}

const stageBg = c=>`background:radial-gradient(120% 100% at 50% -10%, ${c}22 0%, #10131c 55%, #0a0c12 100%);`;

const SLIDES = [
{ name:'Intro / Sigla', html:()=>`
  <div style="position:absolute;inset:0;${stageBg('#e9c46a')}"></div>
  <div style="margin:auto;text-align:center;">
    <div class="kick" style="letter-spacing:9px;">Canada · Mexico · USA · 2026</div>
    <div class="cond" style="font-weight:800;font-size:150px;color:var(--ink);line-height:.9;margin:14px 0 6px;">ROAD TO<br>THE FINAL</div>
    <div class="cond" style="font-weight:700;font-size:30px;letter-spacing:8px;color:var(--gold);text-transform:uppercase;">— The Film —</div>
    <div style="margin-top:34px;display:flex;gap:34px;justify-content:center;color:var(--sub);" class="cond">
      <div style="text-align:center;"><div style="font-size:44px;font-weight:800;color:var(--ink);">48</div><div style="letter-spacing:2px;">TEAMS</div></div>
      <div style="text-align:center;"><div style="font-size:44px;font-weight:800;color:var(--ink);">104</div><div style="letter-spacing:2px;">MATCHES</div></div>
      <div style="text-align:center;"><div style="font-size:44px;font-weight:800;color:var(--ink);">1</div><div style="letter-spacing:2px;">TROPHY</div></div>
    </div>
  </div>`},

{ name:'Titolo capitolo', html:()=>`
  <div style="position:absolute;inset:0;${stageBg('#37b56a')}"></div>
  <div style="margin:auto;text-align:center;">
    <div class="kick" style="color:var(--green);letter-spacing:8px;">Phase 01</div>
    <div class="cond" style="font-weight:800;font-size:170px;color:var(--ink);line-height:.86;margin:6px 0;">GROUP<br>STAGE</div>
    <div class="cond" style="font-weight:700;font-size:26px;letter-spacing:6px;color:var(--sub);text-transform:uppercase;">12 groups · 72 matches</div>
  </div>`},

{ name:'Presentazione match', html:()=>`
  <div style="position:absolute;inset:0;${stageBg('#22b0f0')}"></div>
  <div style="position:absolute;top:50px;left:0;right:0;text-align:center;">
    <div class="kick" style="color:var(--blue);">Group A · Matchday 1</div>
  </div>
  <div style="position:absolute;left:60px;right:60px;top:130px;bottom:150px;display:flex;align-items:center;">
    ${teamCol('MEX','MEXICO','4-1-2-3')}
    <div style="flex:0 0 150px;text-align:center;">
      <div class="cond" style="font-weight:800;font-size:70px;color:var(--sub);">VS</div>
    </div>
    ${teamCol('RSA','SOUTH AFRICA','5-3-2')}
  </div>
  <div style="position:absolute;left:0;right:0;bottom:56px;text-align:center;" class="cond">
    <span class="pill" style="margin:0 6px;">🏟 Mexico City Stadium</span>
    <span class="pill" style="margin:0 6px;">Jun 12 · 21:00</span>
    <span class="pill" style="margin:0 6px;">👥 80,824</span>
  </div>`},

{ name:'Calcio d\'inizio', html:()=>`
  <div style="position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 50%, #14361f 0%, #0a0c12 70%);"></div>
  <div style="margin:auto;text-align:center;">
    <div class="cond" style="font-weight:800;font-size:150px;color:var(--green);letter-spacing:6px;text-shadow:0 0 40px rgba(55,181,106,.5);">KICK-OFF</div>
    <div class="cond" style="font-weight:700;font-size:24px;letter-spacing:8px;color:var(--sub);text-transform:uppercase;margin-top:10px;">Mexico · South Africa</div>
  </div>`},

{ name:'GOL', html:()=>{
  const p=P.Bellingham;
  return `
  <div style="position:absolute;inset:0;${stageBg('#37b56a')}"></div>
  <img src="${photo(p,760)}" style="position:absolute;right:40px;bottom:0;height:108%;object-fit:contain;object-position:bottom;filter:drop-shadow(0 24px 44px rgba(0,0,0,.6));">
  <div class="grad-bottom"></div>
  <div style="position:absolute;left:66px;top:60px;"><span class="badge" style="background:var(--green);box-shadow:0 6px 20px #37b56a66;">⚽ GOAL</span></div>
  <!-- running scoreline -->
  <div style="position:absolute;left:66px;top:130px;display:flex;align-items:center;gap:14px;">
    <img class="flag" src="${flag('gb-eng')}" style="height:34px;"><span class="cond" style="font-weight:800;font-size:40px;color:var(--ink);">ENG</span>
    <span class="cond" style="font-weight:800;font-size:52px;color:var(--green);">2–1</span>
    <span class="cond" style="font-weight:800;font-size:40px;color:var(--ink);">NOR</span><img class="flag" src="${flag('no')}" style="height:34px;">
  </div>
  <div style="position:absolute;right:66px;top:56px;text-align:right;line-height:.8;">
    <div class="cond" style="font-weight:800;font-size:150px;color:var(--green);text-shadow:0 3px 16px rgba(0,0,0,.6);">52'</div>
  </div>
  <div style="position:absolute;left:66px;bottom:80px;max-width:660px;">
    <div style="display:flex;align-items:center;gap:14px;"><div class="cond" style="font-weight:800;font-size:78px;color:var(--ink);line-height:.9;">Bellingham</div><img class="flag" src="${flag('gb-eng')}" style="height:40px;"></div>
    <div class="cond" style="font-weight:700;font-size:19px;color:var(--sub);margin:6px 0 12px;">Assist · Gordon &nbsp;·&nbsp; #6 for goals</div>
    <div style="display:flex;gap:11px;"><div style="width:3px;background:var(--green);border-radius:3px;"></div>
      <div style="font-size:19px;font-style:italic;color:var(--ink);opacity:.9;line-height:1.4;">Bellingham struck again — Nyland couldn't hold a long-range effort and Bellingham pounced to put his side ahead.</div></div>
  </div>`;}},

{ name:'Cartellino rosso', html:()=>`
  <div style="position:absolute;inset:0;background:radial-gradient(80% 80% at 50% 40%, #3a0f0f 0%, #0a0c12 72%);"></div>
  <div style="margin:auto;text-align:center;">
    <div style="width:150px;height:210px;border-radius:12px;background:linear-gradient(160deg,#ff5b52,#d0322a);margin:0 auto 34px;box-shadow:0 20px 50px rgba(224,70,63,.5);transform:rotate(8deg);"></div>
    <div class="cond" style="font-weight:800;font-size:96px;color:#ff6b62;letter-spacing:2px;">RED CARD</div>
    <div style="display:flex;align-items:center;gap:14px;justify-content:center;margin-top:10px;">
      <img class="flag" src="${flag('za')}" style="height:34px;"><div class="cond" style="font-weight:800;font-size:48px;color:var(--ink);">Zwane</div>
      <span class="pill">84'</span>
    </div>
  </div>`},

{ name:'Half-time', html:()=>`
  <div style="position:absolute;inset:0;${stageBg('#e9c46a')}"></div>
  <div style="margin:auto;text-align:center;">
    <div class="kick" style="color:var(--gold);">Half time</div>
    <div style="display:flex;align-items:center;gap:44px;justify-content:center;margin-top:26px;">
      <div style="text-align:center;"><img class="flag" src="${flag('mx',640)}" style="width:150px;height:100px;"><div class="cond" style="font-weight:800;font-size:40px;color:var(--ink);margin-top:12px;">MEXICO</div></div>
      <div class="cond" style="font-weight:900;font-size:150px;color:var(--ink);line-height:.8;">1&nbsp;–&nbsp;0</div>
      <div style="text-align:center;"><img class="flag" src="${flag('za',640)}" style="width:150px;height:100px;"><div class="cond" style="font-weight:800;font-size:40px;color:var(--ink);margin-top:12px;">S. AFRICA</div></div>
    </div>
    <div class="cond" style="font-weight:700;font-size:20px;color:var(--sub);margin-top:22px;">⚽ Quiñones 9'</div>
  </div>`},

{ name:'Full-time', html:()=>`
  <div style="position:absolute;inset:0;${stageBg('#37b56a')}"></div>
  <div style="margin:auto;text-align:center;width:100%;">
    <div class="kick" style="color:var(--green);">Full time</div>
    <div style="display:flex;align-items:center;gap:44px;justify-content:center;margin-top:22px;">
      <div style="text-align:center;"><img class="flag" src="${flag('mx',640)}" style="width:158px;height:104px;"><div class="cond" style="font-weight:800;font-size:42px;color:var(--ink);margin-top:12px;">MEXICO</div></div>
      <div class="cond" style="font-weight:900;font-size:160px;color:var(--ink);line-height:.8;">2&nbsp;–&nbsp;0</div>
      <div style="text-align:center;"><img class="flag" src="${flag('za',640)}" style="width:158px;height:104px;"><div class="cond" style="font-weight:800;font-size:42px;color:var(--ink);margin-top:12px;">S. AFRICA</div></div>
    </div>
    <div style="display:flex;gap:40px;justify-content:center;margin-top:26px;" class="cond">
      <div style="color:var(--sub);font-size:19px;font-weight:700;">⚽ Quiñones 9' &nbsp;·&nbsp; Jiménez 67'</div>
      <div style="color:var(--sub);font-size:19px;font-weight:700;">🟥 3 red cards</div>
    </div>
  </div>`},

{ name:'Classifica girone', html:()=>{
  const rows=[['MEX',3,0,0,'+4',9],['RSA',1,1,1,'0',4],['KOR',1,0,2,'-1',3],['CZE',0,1,2,'-3',1]];
  const tr=(r,i)=>`<div style="display:flex;align-items:center;gap:16px;padding:13px 22px;border-radius:10px;${i<2?'background:rgba(55,181,106,.12);':''}">
     <div class="cond" style="width:30px;font-weight:800;font-size:26px;color:${i<2?'var(--green)':'var(--sub)'};">${i+1}</div>
     <img class="flag" src="${flag(ALLISO[r[0]])}" style="width:44px;height:29px;">
     <div class="cond" style="flex:1;font-weight:700;font-size:26px;color:var(--ink);">${r[0]}</div>
     <div class="cond" style="width:60px;text-align:center;color:var(--sub);font-size:20px;">${r[1]}-${r[2]}-${r[3]}</div>
     <div class="cond" style="width:70px;text-align:center;color:var(--sub);font-size:20px;">${r[4]}</div>
     <div class="cond" style="width:70px;text-align:right;font-weight:800;font-size:28px;color:var(--ink);">${r[5]}</div></div>`;
  return `<div style="position:absolute;inset:0;${stageBg('#22b0f0')}"></div>
   <div style="margin:auto;width:720px;">
     <div style="text-align:center;margin-bottom:16px;"><div class="cond" style="font-weight:800;font-size:52px;color:var(--ink);">GROUP A</div><div class="kick" style="color:var(--blue);">Final standings</div></div>
     <div style="display:flex;padding:0 22px 8px;color:var(--sub);" class="cond"><div style="width:46px;">#</div><div style="width:60px;"></div><div style="flex:1;font-size:13px;letter-spacing:1px;">TEAM</div><div style="width:60px;text-align:center;font-size:13px;">W-D-L</div><div style="width:70px;text-align:center;font-size:13px;">GD</div><div style="width:70px;text-align:right;font-size:13px;">PTS</div></div>
     ${rows.map(tr).join('')}
     <div style="text-align:center;margin-top:12px;color:var(--green);" class="cond kick">↑ Qualified</div>
   </div>`;}},

{ name:'Le 32 qualificate', html:()=>{
  const codes=Object.keys(ALLISO).slice(0,32);
  const cell=c=>`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><img class="flag" src="${flag(ALLISO[c])}" style="width:74px;height:49px;"><div class="cond" style="font-weight:700;font-size:15px;color:var(--sub);">${c}</div></div>`;
  return `<div style="position:absolute;inset:0;${stageBg('#e9c46a')}"></div>
   <div style="position:absolute;top:44px;left:0;right:0;text-align:center;"><div class="cond" style="font-weight:800;font-size:56px;color:var(--ink);">THE ROUND OF 32</div><div class="kick" style="color:var(--gold);">Groups complete</div></div>
   <div style="position:absolute;left:70px;right:70px;top:170px;bottom:44px;display:grid;grid-template-columns:repeat(8,1fr);gap:18px 10px;align-content:center;">${codes.map(cell).join('')}</div>`;}},

{ name:'Cerchio / bracket', html:()=>{
  const ring=Object.keys(ALLISO).slice(0,16).map((c,i)=>{
    const a=(i/16)*2*Math.PI - Math.PI/2, R=250, x=640+R*Math.cos(a), y=340+R*Math.sin(a);
    const hot = c==='ESP'||c==='FRA';
    return `<img class="flag" src="${flag(ALLISO[c])}" style="position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-50%);width:${hot?58:44}px;height:${hot?38:29}px;${hot?'outline:3px solid var(--green);border-radius:4px;':'opacity:.85;'}">`;
  }).join('');
  return `<div style="position:absolute;inset:0;background:radial-gradient(70% 70% at 50% 47%, #14243a 0%, #0a0c12 72%);"></div>
   <div style="position:absolute;top:40px;left:0;right:0;text-align:center;"><div class="cond" style="font-weight:800;font-size:46px;color:var(--ink);">ROUND OF 16 · ESP 1–0 POR</div><div class="kick" style="color:var(--green);">The circle updates</div></div>
   ${ring}
   <div style="position:absolute;left:640px;top:340px;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;"><div class="cond" style="font-weight:800;font-size:22px;color:var(--gold);text-align:center;">TO THE<br>FINAL</div></div>`;}},

{ name:'By the numbers', html:()=>`
  <div style="position:absolute;inset:0;${stageBg('#37b56a')}"></div>
  <div style="margin:auto;text-align:center;">
    <div class="kick" style="color:var(--green);">By the numbers · so far</div>
    <div class="cond" style="font-weight:900;font-size:210px;color:var(--ink);line-height:.82;margin:6px 0;">251</div>
    <div class="cond" style="font-weight:700;font-size:34px;letter-spacing:6px;color:var(--sub);text-transform:uppercase;">goals scored</div>
    <div style="margin-top:30px;display:inline-flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:40px;padding:9px 20px;">
      <img class="flag" src="${flag('ar')}" style="height:26px;"><span class="cond" style="font-weight:700;font-size:22px;color:var(--ink);">Messi</span>
      <span class="cond" style="color:var(--sub);">leads with</span><span class="cond" style="font-weight:800;font-size:30px;color:var(--green);">8</span></div>
  </div>`},

{ name:'Campione', html:()=>{
  const conf=Array.from({length:40},(_,i)=>{const c=['#e9c46a','#37b56a','#22b0f0','#ef8a34','#8b6dff','#fff'][i%6];return `<div style="position:absolute;left:${(i*137)%1280}px;top:${(i*89)%400}px;width:9px;height:14px;background:${c};opacity:.85;transform:rotate(${i*33}deg);border-radius:1px;"></div>`;}).join('');
  return `<div style="position:absolute;inset:0;background:radial-gradient(80% 80% at 50% 30%, #3a2f10 0%, #0a0c12 72%);"></div>
   ${conf}

// ---------- carousel ----------
const stage=document.getElementById('stage'), dots=document.getElementById('dots'), label=document.getElementById('label');
let cur=0;
SLIDES.forEach((s,i)=>{ const el=document.createElement('div'); el.className='slide'; el.dataset.i=i; el.innerHTML=s.html(); stage.appendChild(el);
  const d=document.createElement('div'); d.className='dot'; d.onclick=()=>show(i); dots.appendChild(d); });
function show(i){ cur=(i+SLIDES.length)%SLIDES.length;
  [...stage.children].forEach((el,k)=>el.classList.toggle('on',k===cur));
  [...dots.children].forEach((el,k)=>el.classList.toggle('on',k===cur));
  label.innerHTML='<span id="idx">'+(cur+1)+'/'+SLIDES.length+'</span> · '+SLIDES[cur].name; }
function go(d){ show(cur+d); }
window.show=show; window.go=go;
addEventListener('keydown',e=>{ if(e.key==='ArrowRight')go(1); if(e.key==='ArrowLeft')go(-1); });
function fit(){ const s=Math.min(innerWidth/1280,(innerHeight-70)/720); stage.style.transform='scale('+s.toFixed(3)+')'; }
addEventListener('resize',fit); fit();
show(+(new URLSearchParams(location.search).get('s')) || 0);
</script>
