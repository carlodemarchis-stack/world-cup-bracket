<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC Movie — Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1c1813; --sub:#6b6256; --line:rgba(0,0,0,.1);
         --green:#2f9e57; --orange:#ef8a34; --blue:#1499d6; --violet:#7c4dff; --gold:#cf9c1e; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; background:#c9c4ba; overflow:hidden; font-family:'Barlow',system-ui,sans-serif; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{ width:1280px; height:720px; position:relative; overflow:hidden; background:#faf7f0; box-shadow:0 30px 90px rgba(0,0,0,.5); }
  .slide{ position:absolute; inset:0; display:none; }
  .slide.on{ display:block; }
  .cond{ font-family:'Barlow Condensed',sans-serif; }
  .kick{ font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:var(--sub); }
  .flag{ border-radius:3px; box-shadow:0 2px 8px rgba(0,0,0,.25); object-fit:cover; }
  .badge{ display:inline-flex; align-items:center; gap:8px; font-family:'Barlow Condensed',sans-serif; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; font-size:14px; padding:6px 13px; border-radius:6px; color:#fff; }
  .pill{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:#fff; border-radius:30px; padding:5px 13px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.4px; color:#4a4238; font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,.06); }
  .av{ border-radius:50%; overflow:hidden; background:#eee6d6; flex:none; box-shadow:0 3px 10px rgba(0,0,0,.2); }
  .av img{ width:100%; height:100%; object-fit:cover; object-position:top; display:block; }
  #hud{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:14px; background:#1c1813; border-radius:40px; padding:8px 12px; z-index:50; font-family:'Barlow Condensed',sans-serif; }
  #hud button{ background:transparent; border:none; color:#f0ebdd; cursor:pointer; font:inherit; font-size:16px; padding:6px 10px; border-radius:20px; }
  #hud button:hover{ background:rgba(255,255,255,.12); }
  #label{ min-width:220px; text-align:center; font-weight:700; letter-spacing:.6px; text-transform:uppercase; font-size:13px; color:#f0ebdd; }
  #idx{ color:var(--gold); }
  .dots{ display:flex; gap:5px; } .dot{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; } .dot.on{ background:var(--gold); }
</style>
</head>
<body>
<div id="wrap"><div id="stage"></div></div>
<div id="hud"><button onclick="go(-1)">◀ Prev</button><div id="label"></div><button onclick="go(1)">Next ▶</button><div class="dots" id="dots"></div></div>
<script>
const P = {
  Messi:{pic:'https://digitalhub.fifa.com/transform/19823774-fac0-485a-8a8f-572e7324c6c2/MESSI-Lionel_229397', iso:'ar', code:'ARG'},
  Mbappe:{pic:'https://digitalhub.fifa.com/transform/66f6087d-9563-4644-8f10-5614ef6e1e51/MBAPPE-Kylian_389867', iso:'fr', code:'FRA'},
  Olise:{pic:'https://digitalhub.fifa.com/transform/979cc206-e23b-4b21-8d40-843607ba8964/OLISE-Michael_485655', iso:'fr', code:'FRA'},
  Bellingham:{pic:'https://digitalhub.fifa.com/transform/d711b37f-ec06-4ea7-bb52-50ba0a42ef67/BELLINGHAM-Jude_448202', iso:'gb-eng', code:'ENG'},
  Costa:{pic:'https://digitalhub.fifa.com/transform/7c3541e5-a8cb-458c-b368-7f57c1b5ae03/DIOGO-COSTA_403001', iso:'pt', code:'POR'}
};
const flag=(iso,w=320)=>'https://flagcdn.com/w'+w+'/'+iso+'.png';
const hero=(p,w=720)=>p.pic+'?&io=transform:fit,width:'+w+'&quality=90';
const face=(p)=>p.pic+'?&io=transform:fill,aspectratio:1x1,width:200,gravity:top&quality=85';
const ISO={"BRA":"br","JPN":"jp","CIV":"ci","NOR":"no","MEX":"mx","ECU":"ec","ENG":"gb-eng","COD":"cd","ARG":"ar","CPV":"cv","AUS":"au","EGY":"eg","SUI":"ch","ALG":"dz","COL":"co","GHA":"gh","SEN":"sn","BEL":"be","BIH":"ba","USA":"us","AUT":"at","ESP":"es","CRO":"hr","POR":"pt","MAR":"ma","NED":"nl","CAN":"ca","RSA":"za","SWE":"se","FRA":"fr","PAR":"py","GER":"de","KOR":"kr","CZE":"cz","QAT":"qa","SCO":"gb-sct","HAI":"ht","TUR":"tr","CUW":"cw","TUN":"tn","IRN":"ir","NZL":"nz","URU":"uy","KSA":"sa","IRQ":"iq","JOR":"jo","UZB":"uz","PAN":"pa"};
const bg=t=>`background:radial-gradient(120% 90% at 50% -5%, ${t}20 0%, #faf7f0 52%, #f1ebde 100%);`;
const A='https://worldcupbracket.aguywithascarf.com/';

function teamCol(code,name,form){ return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:20px;">
  <img class="flag" src="${flag(ISO[code],640)}" style="width:200px;height:132px;">
  <div class="cond" style="font-weight:800;font-size:56px;color:var(--ink);text-align:center;line-height:.95;">${name}</div>
  <div class="pill">${form}</div></div>`; }

const SLIDES=[
{name:'Intro / Sigla', html:()=>`<div class="slide-bg" style="position:absolute;inset:0;${bg('#cf9c1e')}"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="kick" style="letter-spacing:9px;">Canada · Mexico · USA · 2026</div>
    <div class="cond" style="font-weight:800;font-size:150px;color:var(--ink);line-height:.88;margin:12px 0 8px;">ROAD TO<br>THE FINAL</div>
    <div class="cond" style="font-weight:700;font-size:28px;letter-spacing:8px;color:var(--gold);text-transform:uppercase;">— The Film —</div>
    <div style="margin-top:34px;display:flex;gap:38px;" class="cond">
      ${[['48','TEAMS'],['104','MATCHES'],['1','TROPHY']].map(s=>`<div style="text-align:center;"><div style="font-size:46px;font-weight:800;color:var(--ink);">${s[0]}</div><div style="letter-spacing:2px;color:var(--sub);">${s[1]}</div></div>`).join('')}
    </div></div>`},

{name:'Titolo capitolo', html:()=>`<div style="position:absolute;inset:0;${bg('#2f9e57')}"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="kick" style="color:var(--green);letter-spacing:8px;">Phase 01</div>
    <div class="cond" style="font-weight:800;font-size:168px;color:var(--ink);line-height:.86;margin:6px 0;">GROUP<br>STAGE</div>
    <div class="cond" style="font-weight:700;font-size:26px;letter-spacing:6px;color:var(--sub);text-transform:uppercase;">12 groups · 72 matches</div></div>`},

{name:'Presentazione match', html:()=>`<div style="position:absolute;inset:0;${bg('#1499d6')}"></div>
  <div style="position:relative;z-index:1;height:100%;">
    <div style="position:absolute;top:52px;left:0;right:0;text-align:center;"><div class="kick" style="color:var(--blue);">Group A · Matchday 1</div></div>
    <div style="position:absolute;left:60px;right:60px;top:130px;bottom:150px;display:flex;align-items:center;">
      ${teamCol('MEX','MEXICO','4-1-2-3')}<div style="flex:0 0 150px;text-align:center;"><div class="cond" style="font-weight:800;font-size:68px;color:#bcae97;">VS</div></div>${teamCol('RSA','SOUTH AFRICA','5-3-2')}
    </div>
    <div style="position:absolute;left:0;right:0;bottom:56px;text-align:center;">
      <span class="pill" style="margin:0 6px;">🏟 Mexico City Stadium</span><span class="pill" style="margin:0 6px;">Jun 12 · 21:00</span><span class="pill" style="margin:0 6px;">👥 80,824</span>
    </div></div>`},

{name:'Calcio d\'inizio', html:()=>`<div style="position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 50%, #d9efe0 0%, #faf7f0 70%);"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="cond" style="font-weight:800;font-size:148px;color:var(--green);letter-spacing:6px;">KICK-OFF</div>
    <div class="cond" style="font-weight:700;font-size:24px;letter-spacing:8px;color:var(--sub);text-transform:uppercase;margin-top:8px;">Mexico · South Africa</div></div>`},

{name:'GOL + assist', html:()=>{ const s=P.Mbappe, a=P.Olise; return `<div style="position:absolute;inset:0;${bg('#2f9e57')}"></div>
  <img src="${hero(s,760)}" style="position:absolute;right:36px;bottom:0;height:108%;object-fit:contain;object-position:bottom;filter:drop-shadow(-8px 20px 30px rgba(0,0,0,.28));z-index:1;">
  <div style="position:relative;z-index:2;height:100%;">
    <div style="position:absolute;left:66px;top:58px;"><span class="badge" style="background:var(--green);box-shadow:0 6px 20px #2f9e5766;">⚽ GOAL</span></div>
    <div style="position:absolute;left:66px;top:126px;display:flex;align-items:center;gap:14px;">
      <img class="flag" src="${flag('fr')}" style="height:34px;"><span class="cond" style="font-weight:800;font-size:40px;color:var(--ink);">FRA</span>
      <span class="cond" style="font-weight:800;font-size:52px;color:var(--green);">2–0</span>
      <span class="cond" style="font-weight:800;font-size:40px;color:var(--ink);">ESP</span><img class="flag" src="${flag('es')}" style="height:34px;"></div>
    <div style="position:absolute;right:60px;top:52px;text-align:right;"><div class="cond" style="font-weight:800;font-size:146px;color:var(--green);line-height:.8;">38'</div></div>
    <div style="position:absolute;left:66px;bottom:74px;max-width:640px;">
      <div style="display:flex;align-items:center;gap:14px;"><div class="cond" style="font-weight:800;font-size:76px;color:var(--ink);line-height:.9;">Mbappé</div><img class="flag" src="${flag('fr')}" style="height:40px;"></div>
      <!-- ASSIST with player -->
      <div style="display:inline-flex;align-items:center;gap:11px;margin:14px 0 14px;background:#fff;border:1px solid var(--line);border-radius:40px;padding:6px 16px 6px 6px;box-shadow:0 4px 14px rgba(0,0,0,.1);">
        <div class="av" style="width:42px;height:42px;"><img src="${face(a)}"></div>
        <div style="line-height:1;"><div class="cond" style="font-weight:700;font-size:11px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;">Assist</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:3px;"><span style="font-weight:700;font-size:20px;color:var(--ink);">Olise</span><img class="flag" src="${flag('fr')}" style="height:15px;"></div></div></div>
      <div style="display:flex;gap:11px;"><div style="width:3px;background:var(--green);border-radius:3px;"></div>
        <div style="font-size:18px;font-style:italic;color:#3f382e;line-height:1.4;">Olise threads it through and Mbappé sweeps home first-time — a moment of pure class.</div></div>
    </div></div>`;}},

{name:'Cartellino rosso', html:()=>`<div style="position:absolute;inset:0;background:radial-gradient(80% 80% at 50% 40%, #f7dedb 0%, #faf7f0 72%);"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div style="width:148px;height:206px;border-radius:12px;background:linear-gradient(160deg,#ff5b52,#d0322a);margin-bottom:32px;box-shadow:0 18px 44px rgba(224,70,63,.4);transform:rotate(8deg);"></div>
    <div class="cond" style="font-weight:800;font-size:94px;color:#d0322a;letter-spacing:2px;">RED CARD</div>
    <div style="display:flex;align-items:center;gap:14px;margin-top:8px;"><img class="flag" src="${flag('za')}" style="height:34px;"><div class="cond" style="font-weight:800;font-size:46px;color:var(--ink);">Zwane</div><span class="pill">84'</span></div></div>`},

{name:'Half-time', html:()=>`<div style="position:absolute;inset:0;${bg('#cf9c1e')}"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="kick" style="color:var(--gold);">Half time</div>
    <div style="display:flex;align-items:center;gap:44px;margin-top:24px;">
      <div style="text-align:center;"><img class="flag" src="${flag('mx',640)}" style="width:150px;height:100px;"><div class="cond" style="font-weight:800;font-size:38px;color:var(--ink);margin-top:12px;">MEXICO</div></div>
      <div class="cond" style="font-weight:900;font-size:150px;color:var(--ink);line-height:.8;">1&nbsp;–&nbsp;0</div>
      <div style="text-align:center;"><img class="flag" src="${flag('za',640)}" style="width:150px;height:100px;"><div class="cond" style="font-weight:800;font-size:38px;color:var(--ink);margin-top:12px;">S. AFRICA</div></div></div>
    <div class="cond" style="font-weight:700;font-size:20px;color:var(--sub);margin-top:22px;">⚽ Quiñones 9'</div></div>`},

{name:'Full-time', html:()=>`<div style="position:absolute;inset:0;${bg('#2f9e57')}"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="kick" style="color:var(--green);">Full time</div>
    <div style="display:flex;align-items:center;gap:44px;margin-top:20px;">
      <div style="text-align:center;"><img class="flag" src="${flag('mx',640)}" style="width:156px;height:104px;"><div class="cond" style="font-weight:800;font-size:40px;color:var(--ink);margin-top:12px;">MEXICO</div></div>
      <div class="cond" style="font-weight:900;font-size:160px;color:var(--ink);line-height:.8;">2&nbsp;–&nbsp;0</div>
      <div style="text-align:center;"><img class="flag" src="${flag('za',640)}" style="width:156px;height:104px;"><div class="cond" style="font-weight:800;font-size:40px;color:var(--ink);margin-top:12px;">S. AFRICA</div></div></div>
    <div style="display:flex;gap:40px;margin-top:24px;" class="cond"><div style="color:var(--sub);font-size:19px;font-weight:700;">⚽ Quiñones 9' · Jiménez 67'</div><div style="color:var(--sub);font-size:19px;font-weight:700;">🟥 3 red cards</div></div></div>`},

{name:'Classifica girone', html:()=>{ const rows=[['MEX',3,0,0,'+4',9],['RSA',1,1,1,'0',4],['KOR',1,0,2,'-1',3],['CZE',0,1,2,'-3',1]];
  const tr=(r,i)=>`<div style="display:flex;align-items:center;gap:16px;padding:13px 22px;border-radius:10px;background:${i<2?'rgba(47,158,87,.1)':'#fff'};box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:6px;">
    <div class="cond" style="width:30px;font-weight:800;font-size:26px;color:${i<2?'var(--green)':'var(--sub)'};">${i+1}</div>
    <img class="flag" src="${flag(ISO[r[0]])}" style="width:44px;height:29px;">
    <div class="cond" style="flex:1;font-weight:700;font-size:26px;color:var(--ink);">${r[0]}</div>
    <div class="cond" style="width:64px;text-align:center;color:var(--sub);font-size:20px;">${r[1]}-${r[2]}-${r[3]}</div>
    <div class="cond" style="width:64px;text-align:center;color:var(--sub);font-size:20px;">${r[4]}</div>
    <div class="cond" style="width:64px;text-align:right;font-weight:800;font-size:28px;color:var(--ink);">${r[5]}</div></div>`;
  return `<div style="position:absolute;inset:0;${bg('#1499d6')}"></div>
   <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;">
     <div style="text-align:center;margin-bottom:16px;"><div class="cond" style="font-weight:800;font-size:52px;color:var(--ink);">GROUP A</div><div class="kick" style="color:var(--blue);">Final standings</div></div>
     <div style="width:730px;">${rows.map(tr).join('')}<div style="text-align:center;margin-top:8px;color:var(--green);" class="cond kick">↑ Qualified</div></div></div>`;}},

{name:'Le 32 qualificate', html:()=>{ const codes=Object.keys(ISO).slice(0,32);
  const cell=c=>`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><img class="flag" src="${flag(ISO[c])}" style="width:74px;height:49px;"><div class="cond" style="font-weight:700;font-size:15px;color:var(--sub);">${c}</div></div>`;
  return `<div style="position:absolute;inset:0;${bg('#cf9c1e')}"></div>
   <div style="position:relative;z-index:1;height:100%;">
     <div style="position:absolute;top:44px;left:0;right:0;text-align:center;"><div class="cond" style="font-weight:800;font-size:56px;color:var(--ink);">THE ROUND OF 32</div><div class="kick" style="color:var(--gold);">Groups complete</div></div>
     <div style="position:absolute;left:70px;right:70px;top:170px;bottom:44px;display:grid;grid-template-columns:repeat(8,1fr);gap:18px 10px;align-content:center;">${codes.map(cell).join('')}</div></div>`;}},

{name:'Il cerchio (vero)', html:()=>`<div style="position:absolute;inset:0;background:#faf7f0;"></div>
  <iframe src="${A}" style="position:absolute;inset:0;width:1280px;height:820px;border:0;transform:scale(.88);transform-origin:top center;left:50%;margin-left:-640px;"></iframe>
  <div style="position:absolute;top:0;left:0;right:0;height:78px;background:linear-gradient(180deg,#faf7f0,transparent);z-index:2;"></div>
  <div style="position:absolute;top:22px;left:0;right:0;text-align:center;z-index:3;"><div class="cond" style="font-weight:800;font-size:30px;color:var(--ink);">ROUND OF 16 · ESP 1–0 POR</div><div class="kick" style="color:var(--green);font-size:11px;">The real circle updates</div></div>`},

{name:'By the numbers', html:()=>`<div style="position:absolute;inset:0;${bg('#2f9e57')}"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="kick" style="color:var(--green);">By the numbers · so far</div>
    <div class="cond" style="font-weight:900;font-size:208px;color:var(--ink);line-height:.82;margin:4px 0;">251</div>
    <div class="cond" style="font-weight:700;font-size:34px;letter-spacing:6px;color:var(--sub);text-transform:uppercase;">goals scored</div>
    <div style="margin-top:28px;display:inline-flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:40px;padding:9px 20px;box-shadow:0 4px 14px rgba(0,0,0,.08);">
      <img class="flag" src="${flag('ar')}" style="height:26px;"><span class="cond" style="font-weight:700;font-size:22px;color:var(--ink);">Messi</span><span class="cond" style="color:var(--sub);">leads with</span><span class="cond" style="font-weight:800;font-size:30px;color:var(--green);">8</span></div></div>`},

{name:'Campione', html:()=>{ const conf=Array.from({length:44},(_,i)=>{const c=['#cf9c1e','#2f9e57','#1499d6','#ef8a34','#7c4dff','#e0463f'][i%6];return `<div style="position:absolute;left:${(i*137)%1280}px;top:${(i*89)%420}px;width:9px;height:14px;background:${c};opacity:.9;transform:rotate(${i*33}deg);border-radius:1px;"></div>`;}).join('');
  return `<div style="position:absolute;inset:0;background:radial-gradient(80% 80% at 40% 25%, #f6edcf 0%, #faf7f0 66%);"></div>
   <div style="position:absolute;inset:0;z-index:1;">${conf}</div>
   <img src="${hero(P.Messi,760)}" style="position:absolute;right:70px;bottom:0;height:104%;object-fit:contain;object-position:bottom;filter:drop-shadow(-8px 18px 34px rgba(0,0,0,.28));z-index:2;">
   <div style="position:relative;z-index:3;padding:150px 0 0 70px;">
     <div class="kick" style="color:var(--gold);letter-spacing:8px;">World Champions</div>
     <img class="flag" src="${flag('ar',640)}" style="width:158px;height:104px;margin-top:12px;box-shadow:0 10px 26px rgba(0,0,0,.25);">
     <div class="cond" style="font-weight:900;font-size:128px;color:var(--gold);line-height:.86;margin-top:14px;">ARGENTINA</div>
     <div class="cond" style="font-weight:700;font-size:26px;letter-spacing:5px;color:var(--sub);text-transform:uppercase;">Champions of the World · 2026</div></div>`;}},

{name:'Coda / credits', html:()=>`<div style="position:absolute;inset:0;${bg('#7c4dff')}"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div class="cond" style="font-weight:800;font-size:94px;color:var(--ink);line-height:.9;">ROAD TO<br>THE FINAL</div>
    <div class="cond" style="font-weight:700;font-size:22px;letter-spacing:4px;color:var(--sub);text-transform:uppercase;margin-top:20px;">worldcupbracket.aguywithascarf.com</div>
    <div class="cond" style="font-size:16px;color:var(--sub);margin-top:26px;">Data · FIFA &nbsp;·&nbsp; Design from Emilio Sansolini &nbsp;·&nbsp; Built by A guy with a scarf</div></div>`}
];

const stage=document.getElementById('stage'), dots=document.getElementById('dots'), label=document.getElementById('label');
let cur=0;
SLIDES.forEach((s,i)=>{ const el=document.createElement('div'); el.className='slide'; el.innerHTML=s.html(); stage.appendChild(el);
  const d=document.createElement('div'); d.className='dot'; d.onclick=()=>show(i); dots.appendChild(d); });
function show(i){ cur=(i+SLIDES.length)%SLIDES.length;
  [...stage.children].forEach((el,k)=>el.classList.toggle('on',k===cur));
  [...dots.children].forEach((el,k)=>el.classList.toggle('on',k===cur));
  label.innerHTML='<span id="idx">'+(cur+1)+'/'+SLIDES.length+'</span> · '+SLIDES[cur].name; }
function go(d){ show(cur+d); }
window.show=show; window.go=go;
addEventListener('keydown',e=>{ if(e.key==='ArrowRight')go(1); if(e.key==='ArrowLeft')go(-1); });
function fit(){ const s=Math.min(innerWidth/1280,(innerHeight-70)/720); document.getElementById('stage').style.transform='scale('+s.toFixed(3)+')'; }
addEventListener('resize',fit); fit();
show(+(new URLSearchParams(location.search).get('s')) || 0);
</script>
</body>
