<style>
  body { margin: 0; }
  @keyframes wcpulse { 0% { transform: translate(-50%,-50%) scale(1); opacity: .6 } 100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0 } }
  /* Match kicking off within the next 16 hours: a bright, breathing green ring. */
  @keyframes matchSoon {
    0%   { box-shadow: 0 0 0 0 rgba(55,181,106,.95), 0 0 9px 2px rgba(55,181,106,.55), 0 2px 6px rgba(0,0,0,.4); }
    70%  { box-shadow: 0 0 0 11px rgba(55,181,106,0), 0 0 9px 2px rgba(55,181,106,0), 0 2px 6px rgba(0,0,0,.4); }
    100% { box-shadow: 0 0 0 0 rgba(55,181,106,0), 0 0 9px 2px rgba(55,181,106,0), 0 2px 6px rgba(0,0,0,.4); }
  }
  .match-soon { border-color: #2fd177 !important; animation: matchSoon 1.8s ease-in-out infinite; }
  /* Confederation spotlight: crests/match boxes not in the selected confed. */
  [data-confed] { transition: filter .35s ease, opacity .35s ease; }
  .confed-dim, .elim-dim { filter: grayscale(1) !important; opacity: .26 !important; }
  /* Ambient side-gutter bubble: gentle fade + rise, one at a time when idle. */
  /* --wc-scale lets belowMode shrink a card to fit under the circle without
     fighting the slide animation; transform-origin keeps the top anchored. */
  .wc-bubble { opacity: 0; transform-origin: top center; transform: translateY(10px) scale(calc(var(--wc-scale, 1) * .96)); transition: opacity .5s ease, transform .6s cubic-bezier(.2,.8,.2,1); }
  .wc-bubble.show { opacity: 1; transform: translateY(0) scale(var(--wc-scale, 1)); }
  .wc-bubble.hide { opacity: 0; transform: translateY(-14px) scale(calc(var(--wc-scale, 1) * .98)); transition: opacity .6s ease, transform .7s ease; }

  /* Live controls panel — reproduces the design's own editor props.
     Hidden at start; opened via the gear icon in the footer. */
  #controls {
    display: none;
    position: fixed; top: 14px; left: 14px; z-index: 50;
    width: 232px; max-height: calc(100vh - 28px); overflow: auto;
    font-family: 'Barlow', system-ui, sans-serif; font-size: 12px; color: #1c1813;
    background: rgba(255,255,255,.86); backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,.12); border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.16); padding: 12px 14px 14px;
  }
  #controls.open { display: block; }
  #controls.dark { color: #f4efe2; background: rgba(20,19,14,.82); border-color: rgba(255,255,255,.14); }
  #controls .hd { display: flex; align-items: center; justify-content: space-between; margin: 0 0 10px; }
  #controls h2 { margin: 0; font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; opacity: .8; }
  #controls .close { border: none; background: transparent; color: inherit; cursor: pointer; font-size: 20px; line-height: 1; opacity: .55; padding: 0 2px; }
  #controls .close:hover { opacity: 1; }
  /* Standard settings (gear) icon in the footer */
  #settings-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; padding: 0; border-radius: 50%;
    border: 1px solid currentColor; background: transparent; color: inherit;
    cursor: pointer; opacity: .85; transition: opacity .15s, background .15s;
  }
  #settings-toggle:hover, #settings-toggle.on { opacity: 1; background: rgba(128,128,128,.16); }
  /* Clickable team crests / match chips — pointer + subtle hover lift (desktop) */
  #bracket-art [data-team], #bracket-art [data-match] { cursor: pointer; transition: transform .12s ease, filter .12s ease; }
  @media (hover: hover) {
    #bracket-art [data-team]:hover, #bracket-art [data-match]:hover {
      transform: translate(-50%, -50%) scale(1.09) !important;
      filter: brightness(1.07);
      z-index: 20 !important;
    }
  }
  #team-modal table td, #team-modal table th { font-variant-numeric: tabular-nums; }
  #controls .grp { margin-bottom: 12px; }
  #controls .grp:last-child { margin-bottom: 0; }
  #controls label.f { display: block; font-weight: 600; margin-bottom: 4px; letter-spacing: .3px; }
  #controls input[type=text], #controls select {
    width: 100%; box-sizing: border-box; font: inherit; padding: 5px 7px;
    border: 1px solid rgba(0,0,0,.18); border-radius: 6px; background: rgba(255,255,255,.7); color: inherit;
  }
  #controls.dark input[type=text], #controls.dark select { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.2); }
  #controls input[type=range] { width: 100%; }
  #controls .seg { display: flex; gap: 6px; }
  #controls .seg button {
    flex: 1; font: inherit; font-weight: 600; padding: 5px 0; cursor: pointer;
    border: 1px solid rgba(0,0,0,.18); border-radius: 6px; background: transparent; color: inherit;
  }
  #controls .seg button.on { color: #fff; border-color: transparent; }
  #controls .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #controls .swatches { display: flex; gap: 6px; margin-top: 6px; }
  #controls .swatches button { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
  #controls .swatches button.on { border-color: currentColor; }
  #controls .val { opacity: .65; font-variant-numeric: tabular-nums; }
  #controls .chk { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  #controls .chk input { width: 15px; height: 15px; }

  /* Wide laptops/desktops: lift the footer's two parts up into the top corners,
     level with the header's first line. The centered header keeps the middle;
     the corners are otherwise empty. Narrow/mobile keeps the normal bottom row. */
  @media (min-width: 1024px) {
    #site-footer {
      position: absolute !important;
      top: 30px !important; left: 16px !important; right: 16px !important;
      width: auto !important; margin: 0 !important; z-index: 20 !important;
      align-items: flex-start !important;
      pointer-events: none !important;   /* empty middle band lets header clicks through */
    }
    #site-footer > * { pointer-events: auto !important; }
    #site-footer > span { flex: 0 1 auto !important; max-width: 30vw !important; }
  }
</style>

<body>

<div id="app"></div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// Render logic — ported verbatim from World Cup Bracket.dc.html renderVals().
// Produces arrays of {style,...} descriptors; the DOM builder below mirrors the
// original <x-dc> template exactly.
// ---------------------------------------------------------------------------
// ---------------------------------------------------------------------------
// Timezone — stored kickoff times are CEST (UTC+2), fixed across the tournament
// (Jun 11 – Jul 19 2026 is entirely in CEST). Convert to the chosen IANA zone.
// ---------------------------------------------------------------------------
const MONTHS = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };
// Readable summer-2026 abbreviations where Intl only gives "GMT+x". Central-European
// zones fall through to the CEST/EEST heuristic below, so they need no entry here.
const ZONE_ABBR = {
  'Europe/London':'BST', 'Europe/Dublin':'IST', 'Europe/Lisbon':'WEST',
  'America/New_York':'EDT', 'America/Toronto':'EDT', 'America/Chicago':'CDT', 'America/Denver':'MDT',
  'America/Phoenix':'MST', 'America/Los_Angeles':'PDT', 'America/Vancouver':'PDT',
  'America/Mexico_City':'CST', 'America/Sao_Paulo':'BRT', 'America/Argentina/Buenos_Aires':'ART', 'America/Bogota':'COT',
  'Africa/Johannesburg':'SAST', 'Africa/Cairo':'EEST', 'Africa/Lagos':'WAT',
  'Asia/Tokyo':'JST', 'Asia/Seoul':'KST', 'Asia/Shanghai':'CST', 'Asia/Kolkata':'IST', 'Asia/Dubai':'GST', 'Asia/Singapore':'SGT',
  'Australia/Sydney':'AEST', 'Australia/Perth':'AWST', 'Pacific/Auckland':'NZST'
};
const SRC_OFFSET_MIN = 120;
let tz = Intl.DateTimeFormat().resolvedOptions().timeZone;   // client-local, user-selectable
function kickoffInstant(dateStr, timeStr){
  const dm = String(dateStr).split(' '), t = String(timeStr).split(':');
  if (dm.length < 2 || t.length < 2 || !(dm[0] in MONTHS)) return null;
  return new Date(Date.UTC(2026, MONTHS[dm[0]], +dm[1], +t[0], +t[1]) - SRC_OFFSET_MIN * 60000);
}
function fmtKickoff(dateStr, timeStr){
  const inst = (dateStr && timeStr) ? kickoffInstant(dateStr, timeStr) : null;
  if (!inst || isNaN(inst)) return { date: dateStr, time: timeStr, zone: '' };
  const p = {};
  new Intl.DateTimeFormat('en-US', { timeZone: tz, month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false, timeZoneName:'short' })
    .formatToParts(inst).forEach(x => { p[x.type] = x.value; });
  let zone = ZONE_ABBR[tz] || p.timeZoneName;
  if (!ZONE_ABBR[tz] && /^Europe\//.test(tz)){
    if (/\+2$/.test(zone)) zone = 'CEST';
    else if (/\+3$/.test(zone)) zone = 'EEST';
  }
  const hh = (p.hour === '24') ? '00' : p.hour;
  return { date: p.month + ' ' + p.day, time: hh + ':' + p.minute, zone: zone };
}

function renderVals(P, DATA) {
  P = P || {};
  const accent = P.accentColor || '#d6b04a';
  const showNames = P.showNames === true;
  const title = P.title || 'Road to the Final';
  const kicker = P.kicker || 'World Cup 2026 · Knockout Bracket';
  const light = (P.bgTheme || 'Dark') === 'Light';
  const flagMode = (P.nodeStyle || 'Flag') === 'Flag';
  const showResults = P.showResults !== false;
  const gC = (P.sectionGap == null) ? 12 : P.sectionGap;   // equal gaps between the 4 sections (N/E/S/W)
  const gQ = (P.quarterGap == null) ? 6 : P.quarterGap;    // gap splitting each 8-section into 4 + 4

  const elimColor = '#e0463f';
  const T = light ? {
    rootBg:'radial-gradient(circle at 50% 44%, #fbf7ee 0%, #f1ece1 58%, #e9e3d6 100%)',
    titleColor:'#1c1813', kickerColor:'rgba(166,124,28,1)', footerColor:'rgba(70,62,48,.55)',
    labelColor:'rgba(48,42,32,.66)', linkColor:'rgba(58,50,34,0.38)',
    emptyBg:'rgba(40,34,20,.12)', emptyBorder:'rgba(150,112,30,.6)', emptyText:'rgba(60,52,38,.7)',
    chipBg:'rgba(255,253,247,.96)', chipBorder:'rgba(150,112,30,.45)', chipDate:'rgba(70,62,48,.75)', chipScore:'#1c1813',
    innerBg:'#fbf8f1', codeColor:'#1c1813'
  } : {
    rootBg:'radial-gradient(circle at 50% 44%, #1a1810 0%, #0c0c0e 58%, #08080a 100%)',
    titleColor:'#f4efe2', kickerColor:'rgba(214,176,74,.9)', footerColor:'rgba(214,200,170,.42)',
    labelColor:'rgba(228,222,206,.62)', linkColor:'rgba(216,202,170,0.3)',
    emptyBg:'rgba(78,74,64,.75)', emptyBorder:'rgba(216,188,128,.45)', emptyText:'rgba(232,226,210,.62)',
    chipBg:'rgba(18,17,14,.92)', chipBorder:'rgba(216,188,128,.4)', chipDate:'rgba(228,222,206,.6)', chipScore:'#f4efe2',
    innerBg:'#16150f', codeColor:'#efe9da'
  };

  const C = 600;
  const Rr = [440, 345, 250, 165, 85];
  const DEG = Math.PI / 180;

  const TEAMS = DATA.teams;

  // Round-of-32 matches come straight from the live feed (data.json), keyed
  // side:level:k (level 1 = an R32 match). Scheduled matches carry {date,time};
  // played matches carry {score, winner, et?, pens?}.
  const MATCHES = DATA.r32;
  // Derive who advanced / who's eliminated from each played match's winner, so
  // the feed only records a score + winner per result.
  const decidedR16 = {};
  ['R','L'].forEach(side => {
    for (let k = 0; k < 8; k++) {
      const m = MATCHES[side+':1:'+k];
      if (m && m.winner) decidedR16[side+':'+k] = m.winner;
    }
  });
  // Progression for every round (not just R32): the winner advancing to each
  // node, and every team that has since been knocked out. Winners come from the
  // feed — r32 for level 1, schedule for levels 2-4, and DATA.final for the tie.
  function wonAt(side, L, k){
    if (L === 1) return decidedR16[side + ':' + k] || null;
    return (DATA.schedule[side + ':' + L + ':' + k] || {}).winner || null;
  }
  function feederCode(side, L, childK){
    const off = side === 'R' ? 0 : 16;
    return L === 1 ? TEAMS[off + childK].code : wonAt(side, L - 1, childK);
  }
  const eliminated = {};
  ['R','L'].forEach(side => {
    for (let L = 1; L <= 4; L++){
      for (let k = 0; k < 16/Math.pow(2,L); k++){
        const w = wonAt(side, L, k);
        if (!w) continue;
        [feederCode(side,L,2*k), feederCode(side,L,2*k+1)].forEach(c => { if (c && c !== w) eliminated[c] = 1; });
      }
    }
  });
  if (DATA.final && DATA.final.winner){
    const w = DATA.final.winner;
    [wonAt('R',4,0), wonAt('L',4,0)].forEach(c => { if (c && c !== w) eliminated[c] = 1; });
  }
  const bridge = accent + '7a';

  // Balanced layout: four 8-team sections evenly around the circle with equal
  // gaps gC at N/E/S/W; each section split 4+4 by a smaller gap gQ; teams even
  // within each 4-group. Inner-round angles fall out as means of their children.
  const GAP = { 3: gQ, 2: 0, 1: 0 };
  function layout(a0, a1, depth){
    if (depth === 0) return [(a0 + a1) / 2];
    const g = GAP[depth] || 0;
    const each = (a1 - a0 - g) / 2;
    return layout(a0, a0 + each, depth - 1).concat(layout(a1 - each, a1, depth - 1));
  }
  const sec = (a0, a1) => layout(a0, a1, 3);
  const h = gC / 2;
  const leafR = sec(-90 + h, -h).concat(sec(h, 90 - h));
  const leafL = sec(90 + h, 180 - h).concat(sec(180 + h, 270 - h));

  function angleOf(side, L, k){
    const arr = side === 'R' ? leafR : leafL;
    const span = Math.pow(2, L), start = k * span;
    let s = 0; for (let j = start; j < start + span; j++) s += arr[j];
    return s / span;
  }
  function nodePos(side, L, k){
    const a = angleOf(side, L, k);
    return { x: C + Rr[L]*Math.cos(a*DEG), y: C + Rr[L]*Math.sin(a*DEG), a };
  }

  function conic(colors){
    const n = colors.length, seg = 100 / n, stops = [];
    for (let i=0;i<n;i++) stops.push(colors[i]+' '+(i*seg)+'% '+((i+1)*seg)+'%');
    return 'conic-gradient(from 180deg, '+stops.join(', ')+')';
  }
  function makeTeam(t, p, sz, glow, elim, showStatus){
    const base = 'position:absolute;left:'+(p.x/12)+'%;top:'+(p.y/12)+'%;width:'+sz+'px;height:'+sz+'px;'+
      'box-sizing:border-box;transform:translate(-50%,-50%);border-radius:50%;z-index:3;';
    const shadow = glow ? ('0 0 16px '+accent+'cc, 0 2px 6px rgba(0,0,0,.5)') : '0 2px 6px rgba(0,0,0,.4)';
    // crest border carries status: green = advancing/in-game, red = eliminated, white = yet to play
    const bord = '3px solid '+(glow ? accent : (elim ? elimColor : 'rgba(255,255,255,.92)'));
    const boxStyle = flagMode
      ? base+'overflow:hidden;background:'+T.innerBg+';border:'+bord+';box-shadow:'+shadow+';'+(elim?'opacity:.78;':'')
      : base+'background:'+conic(t.colors)+';border:'+bord+';box-shadow:'+shadow+';'+(elim?'opacity:.82;':'');
    const codeCol = glow ? accent : (elim ? elimColor : null);
    // Status pip on the outer roster crests: green ✓ still in / red ✕ out. Built
    // here (theme colours in scope); rendered as a sibling so it isn't clipped.
    let statusBadge = null;
    if (showStatus){
      const bs = Math.round(Math.min(sz, 40) * 0.36);   // cap at group-crest size so the big 32 get the same small pip
      // Place the pip radially — on the outer side of the crest, away from centre.
      const dx = p.x - C, dy = p.y - C, len = Math.hypot(dx, dy) || 1, off = sz * 0.46;
      const ox = Math.round(dx / len * off), oy = Math.round(dy / len * off);
      const sx = (ox >= 0 ? '+ ' : '- ') + Math.abs(ox) + 'px', sy = (oy >= 0 ? '+ ' : '- ') + Math.abs(oy) + 'px';
      statusBadge = {
        sym: elim ? '✕' : '✓',
        style: 'position:absolute;left:calc(' + (p.x/12) + '% ' + sx + ');top:calc(' + (p.y/12) + '% ' + sy + ');transform:translate(-50%,-50%);z-index:5;pointer-events:none;' +
          'width:' + bs + 'px;height:' + bs + 'px;border-radius:50%;background:' + (elim ? elimColor : '#2f9e6b') + ';border:2px solid ' + T.rootBg + ';box-sizing:border-box;' +
          'display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:' + Math.round(bs * 0.58) + 'px;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.4);'
      };
    }
    return {
      code: t.code, name: t.name,
      flag: 'https://flagcdn.com/w320/'+t.iso+'.png',
      statusBadge, elim: !!elim,   // any crest of an eliminated team (outer + inner) dims with "show eliminated" off
      boxStyle,
      chipStyle:'position:absolute;left:50%;bottom:'+Math.round(sz*0.07)+'px;transform:translateX(-50%);pointer-events:none;'+
        'background:'+(glow?accent:(elim?elimColor:'rgba(8,8,10,.7)'))+';color:#ffffff;'+
        "font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:"+Math.round(sz*0.22)+'px;'+
        'letter-spacing:.3px;line-height:1;padding:1px 4px;border-radius:4px;',
      innerStyle:'position:absolute;inset:6px;border-radius:50%;background:'+T.innerBg+';display:flex;'+
        'align-items:center;justify-content:center;box-shadow:inset 0 1px 2px rgba(0,0,0,'+(light?'.2':'.6')+');'+(glow?('border:1px solid '+accent+';'):''),
      codeStyle:"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:"+Math.round(sz*0.30)+'px;'+
        'letter-spacing:.5px;line-height:1;color:'+(codeCol||T.codeColor)+';'
    };
  }

  const teamNodes=[], emptyNodes=[], links=[], labels=[], innerCards=[], statusDots=[];
  // a box at an inner node = the match between its two children (which feed this slot)
  const matchRound = { 1:'R32', 2:'R16', 3:'QF', 4:'SF' };
  // exact kickoff date + CET time per inner match node, from the live feed
  const INNER_INFO = DATA.schedule;
  function dotStyle(p, sz){
    return 'position:absolute;left:'+(p.x/12)+'%;top:'+(p.y/12)+'%;width:'+sz+'px;height:'+sz+'px;'+
      'transform:translate(-50%,-50%);border-radius:50%;background:'+T.emptyBg+';border:1.5px solid '+T.emptyBorder+';box-sizing:border-box;z-index:2;';
  }
  // Confederations still alive in the subtree feeding node (side, L, k) — i.e.
  // whose teams could still reach it. (span = 2^L leaf slots under the node.)
  const leafAliveConfeds = (side, L, k) => {
    const off = side === 'R' ? 0 : 16, span = 1 << L, set = new Set();
    for (let i = k * span; i < (k + 1) * span; i++){ const t = TEAMS[off + i]; if (t && !eliminated[t.code]) set.add(confedOf(t.code)); }
    return set;
  };
  // Confederation(s) a match belongs to: the winner's once played; otherwise
  // every confed that could still get there (used to keep future matches lit).
  function matchConfed(id){
    const rm = resolveMatch(id);
    if (rm && rm.winner) return confedOf(rm.winner);
    const m = /^([RL]):(\d+):(\d+)$/.exec(id);
    if (m) return [...leafAliveConfeds(m[1], +m[2], +m[3])].join(' ');
    if (id === 'final' || id === 'third') return [...new Set([...leafAliveConfeds('R', 4, 0), ...leafAliveConfeds('L', 4, 0)])].join(' ');
    return rm ? [rm.a, rm.b].filter(x => x && x !== '?').map(confedOf).filter(Boolean).join(' ') : '';
  }
  // a card at a node = the match that fills it: a date while pending, a score once played
  function makeInnerCard(px, py, o){
    const hasScore = !!o.score, hasPhase = !!o.phase, k = fmtKickoff(o.date, o.time), hasDate = (!!k.date && !hasScore);
    // Kicking off within the next 12h (and not already decided) → flag for a glow.
    const inst = hasScore ? null : kickoffInstant(o.date, o.time);
    const soon = !!(inst && !isNaN(inst) && inst.getTime() <= Date.now() + 16 * 3600e3 && inst.getTime() >= Date.now() - 3 * 3600e3);
    return {
      soon: soon,
      boxStyle:'position:absolute;left:'+(px/12)+'%;top:'+(py/12)+'%;transform:translate(-50%,-50%);z-index:7;'+
        'background:'+T.chipBg+';border:1px solid '+T.chipBorder+';border-radius:5px;padding:2px 7px 3px;'+
        'text-align:center;white-space:nowrap;line-height:1.12;box-shadow:0 2px 6px rgba(0,0,0,.4);pointer-events:none;',
      match:o.match, confed: o.match ? matchConfed(o.match) : '',
      elim: !!(o.match && (() => { const rm = resolveMatch(o.match); return rm && rm.winner && eliminated[rm.winner]; })()),
      phase:o.phase, hasPhase:hasPhase,
      // feeding teams' 3-letter codes flank the round label, with their flags above
      ta:o.ta||null, tb:o.tb||null,
      taIso: o.ta ? ((TEAMS.find(x => x.code === o.ta) || {}).iso || '') : '',
      tbIso: o.tb ? ((TEAMS.find(x => x.code === o.tb) || {}).iso || '') : '',
      score:o.score, hasScore:hasScore, showScore:hasScore, pens:!!o.pens, penScore:o.penScore || '', showEt:(!!o.et && !o.pens),
      date:k.date, hasDate:hasDate,
      time:k.time, hasTime:(!!k.time && !hasScore), tzLabel:k.zone,
      phaseStyle:'font-family:Barlow,sans-serif;font-weight:700;font-size:7.5px;letter-spacing:.8px;text-transform:uppercase;line-height:1;color:'+accent+';',
      teamStyle:"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.3px;line-height:1;color:"+T.chipScore+';',
      scoreStyle:"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.4px;line-height:1.05;color:"+T.chipScore+';',
      etStyle:'font-family:Barlow,sans-serif;font-weight:600;font-size:7px;letter-spacing:.5px;text-transform:uppercase;line-height:1.3;color:'+T.chipDate+';',
      pensStyle:'font-family:Barlow,sans-serif;font-weight:700;font-size:7px;letter-spacing:.5px;text-transform:uppercase;line-height:1.3;color:'+accent+';',
      pensScoreStyle:'font-family:Barlow,sans-serif;font-weight:700;font-size:7px;letter-spacing:.5px;line-height:1.3;color:'+T.chipScore+';',
      dateStyle:"font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.4px;text-transform:uppercase;line-height:1.12;color:"+T.chipDate+';',
      timeStyle:"font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:8px;letter-spacing:.4px;line-height:1.12;color:"+T.chipDate+';opacity:.8;'
    };
  }

  ['R','L'].forEach(side=>{
    for (let i=0;i<16;i++){
      const t = side==='R' ? TEAMS[i] : TEAMS[16+i];
      const p = nodePos(side,0,i);
      const sz = 52;
      const r32done = !!wonAt(side, 1, Math.floor(i/2));
      const win = r32done && !eliminated[t.code];
      const elim = r32done && !!eliminated[t.code];
      teamNodes.push(makeTeam(t,p,sz,win,elim,true));   // outer roster crest → status pip
      const lr = Rr[0] + sz/2 + 8;
      const la = p.a*DEG;
      const ax = C + lr*Math.cos(la), ay = C + lr*Math.sin(la);
      const leftSide = Math.cos(la) < 0;
      const outer = 'position:absolute;left:'+(ax/12)+'%;top:'+(ay/12)+'%;width:0;height:0;z-index:2;pointer-events:none;';
      const common = "position:absolute;top:0;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;"+
        'font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:'+(win?accent:T.labelColor)+';';
      const inner = leftSide
        ? common+'right:0;transform-origin:100% 0;transform:translateY(-50%) rotate('+(p.a+180)+'deg);text-align:right;'
        : common+'left:0;transform-origin:0 0;transform:translateY(-50%) rotate('+p.a+'deg);text-align:left;';
      labels.push({ name:t.name, outer, inner });
    }
    for (let L=1;L<=4;L++){
      const cnt = 16/Math.pow(2,L);
      for (let k=0;k<cnt;k++){
        const p = nodePos(side,L,k);
        const wc = wonAt(side, L, k);                     // winner advancing to this node
        const m = (L === 1) ? (MATCHES[side+':1:'+k] || {}) : (INNER_INFO[side+':'+L+':'+k] || {});
        if (wc){
          // the winning crest advances inward; dim it (red) if it later went out
          const wn = makeTeam(TEAMS.find(x=>x.code===wc), p, L===1?44:40, !eliminated[wc], !!eliminated[wc]);
          wn.match = side+':'+L+':'+k;   // this crest = the match it won
          teamNodes.push(wn);
          if (showResults && m.score) innerCards.push(makeInnerCard(p.x, p.y - (L===1?21:19), { score:m.score, pens:m.pens, penScore:m.penScore, match:side+':'+L+':'+k }));
        } else {
          // pending match — always shown so upcoming ties stay visible even with
          // scores hidden: round + date/time + the feeding teams' codes.
          const ta = feederCode(side, L, 2*k)   || null;
          const tb = feederCode(side, L, 2*k+1) || null;
          innerCards.push(makeInnerCard(p.x, p.y, { phase:matchRound[L], date:m.date, time:m.time, match:side+':'+L+':'+k, ta, tb }));
        }
      }
    }
    // Crest radius (viewBox units) at a node, so links can start at the crest's
    // edge instead of its centre — otherwise the line shows through a crest that
    // has transparency (e.g. the dimmed loser flags). 0 = no crest there.
    const PX2VB = 1200 / 820;
    const crestVB = (L, k) => {
      if (L === 0) return 26 * PX2VB;                       // leaf crest (52px)
      return wonAt(side, L, k) ? (L === 1 ? 22 : 20) * PX2VB : 0;
    };
    const trimmed = (c, par, rC, rP, extra) => {
      const dx = par.x - c.x, dy = par.y - c.y, len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len;
      return Object.assign({ x1: c.x + ux * rC, y1: c.y + uy * rC,
        x2: par.x - ux * rP, y2: par.y - uy * rP }, extra);
    };
    for (let L=0;L<=3;L++){
      const cnt = 16/Math.pow(2,L);
      for (let k=0;k<cnt;k++){
        const c = nodePos(side,L,k);
        const par = nodePos(side,L+1,Math.floor(k/2));
        const occ = (L===0) ? TEAMS[(side==='R'?0:16)+k].code : wonAt(side,L,k);
        const parentWin = wonAt(side, L+1, Math.floor(k/2));
        // once the parent match is decided, colour this segment: green if the
        // team here advanced, red if this is where it was knocked out.
        let stroke = T.linkColor, w = 1.8, lstyle = '';
        if (occ && parentWin){
          const advanced = parentWin === occ, col = advanced ? accent : elimColor;
          stroke = col; w = 3; lstyle = 'filter:drop-shadow(0 0 5px '+col+'aa)';
        }
        // this segment "starts from" occ (its team); pending segments carry the
        // confeds still alive below, so a confed's onward path stays lit.
        const confed = occ ? confedOf(occ) : [...leafAliveConfeds(side, L, k)].join(' ');
        links.push(trimmed(c, par, crestVB(L, k), crestVB(L+1, Math.floor(k/2)), { stroke, w, lstyle, confed, node: side+':'+L+':'+k }));
      }
    }
    const fin = nodePos(side,4,0);
    const champ = (DATA.final||{}).winner, sfWin = wonAt(side,4,0);
    const finLit = !!champ && !!sfWin && champ === sfWin;
    links.push(trimmed(fin, { x:C, y:C }, crestVB(4, 0), 0, { stroke: finLit?accent:T.linkColor, w: finLit?3:1.8,
      lstyle: finLit?('filter:drop-shadow(0 0 5px '+accent+'aa)'):'',
      confed: sfWin ? confedOf(sfWin) : [...leafAliveConfeds(side, 4, 0)].join(' '), node: side+':4:0' }));
  });

  const rootStyle = 'position:relative;min-height:100vh;background:'+T.rootBg+';padding:30px 16px 44px;font-family:Barlow,system-ui,sans-serif;box-sizing:border-box;';
  const kickerStyle = "font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:4px;text-transform:uppercase;font-size:12px;color:"+T.kickerColor+';';
  const titleStyle = 'font-family:Barlow,sans-serif;font-weight:700;font-size:clamp(26px,4.4vw,42px);margin:4px 0 0;line-height:1.05;color:'+T.titleColor+';';
  const footerStyle = "text-align:center;margin-top:12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:"+T.footerColor+';';
  const hintStyle = "display:inline-flex;align-items:center;gap:6px;margin:7px 0 0;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;font-size:10px;color:"+T.footerColor+';';

  {
    const f = DATA.final || {};
    if (f.winner){
      // champion advances to the final node; the trophy stays dead centre
      const champT = TEAMS.find(x => x.code === f.winner);
      if (champT){ const wn = makeTeam(champT, { x:C, y:C + 78, a:0 }, 46, true, false); wn.match = 'final'; teamNodes.push(wn); }
      if (showResults && f.score) innerCards.push(makeInnerCard(C, C + 78 - 24, { score:f.score, pens:f.pens, penScore:f.penScore, match:'final' }));
    } else {
      innerCards.push(makeInnerCard(C, C + 78, { phase:'Final', date:f.date, time:f.time, match:'final' }));   // upcoming final always shown
    }
  }
  // Third-place play-off: a standalone chip above the trophy (the two SF losers;
  // disconnected from the main path to the final).
  if (DATA.thirdPlace){
    const tp = DATA.thirdPlace;
    if (showResults && tp.winner && tp.score) innerCards.push(makeInnerCard(C, C - 108, { score:tp.score, pens:tp.pens, penScore:tp.penScore, match:'third' }));
    else innerCards.push(makeInnerCard(C, C - 108, { phase:'Third Place', date:tp.date, time:tp.time, match:'third' }));
  }

  // ---- Group-stage eliminated teams: two outer side arcs, like parentheses.
  // The 16 teams that didn't reach the knockout (not among the bracket's 32).
  const ELIM_COLORS = {
    KOR:['#ffffff','#cd2e3a','#0047a0'], CZE:['#ffffff','#d7141a','#11457e'], QAT:['#8a1538','#ffffff'],
    SCO:['#005eb8','#ffffff'], HAI:['#00209f','#d21034'], TUR:['#e30a17','#ffffff'],
    CUW:['#002b7f','#f9e814'], TUN:['#e70013','#ffffff'], IRN:['#239f40','#ffffff','#da0000'],
    NZL:['#00247d','#cc142b','#ffffff'], URU:['#0038a8','#ffffff'], KSA:['#006c35','#ffffff'],
    IRQ:['#ce1126','#ffffff','#000000'], JOR:['#000000','#ffffff','#007a3d'], UZB:['#1eb53a','#0099b5','#ffffff'], PAN:['#da121a','#ffffff','#072357']
  };
  const inBr = {}; TEAMS.forEach(t => inBr[t.code] = 1);
  const elim = [];
  Object.keys(DATA.groups || {}).forEach(g => {
    DATA.groups[g].table.forEach(r => { if (!inBr[r.code]) elim.push({ code:r.code, name:r.name, iso:r.iso, colors: ELIM_COLORS[r.code] || ['#888888','#bbbbbb'] }); });
  });
  const Re = 560, THe = 48, szE = 40;
  const arc = (t, aDeg) => {
    const a = aDeg * DEG, p = { x: C + Re*Math.cos(a), y: C + Re*Math.sin(a), a: aDeg };
    teamNodes.push(makeTeam(t, p, szE, false, true, true));   // group-stage: dimmed crest + red status pip
  };
  elim.slice(0, 8).forEach((t, i) => arc(t, 180 + THe - (2*THe)*i/7));    // left "(" arc, groups A–F, top→bottom
  elim.slice(8, 16).forEach((t, i) => arc(t, -THe + (2*THe)*i/7));        // right ")" arc, groups G–L, top→bottom

  return { teamNodes, emptyNodes, links, labels: showNames?labels:[], innerCards, statusDots, title, kicker, rootStyle, kickerStyle, titleStyle, footerStyle, hintStyle, flagMode, ringMode: !flagMode };
}

// ---------------------------------------------------------------------------
// DOM builder — mirrors the original <x-dc> template node-for-node.
// ---------------------------------------------------------------------------
const SVGNS = 'http://www.w3.org/2000/svg';
function el(tag, style, text){
  const e = document.createElement(tag);
  if (style) e.style.cssText = style;
  if (text != null) e.textContent = text;
  return e;
}
function svg(tag, attrs){
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) if (attrs[k] != null && attrs[k] !== '') e.setAttribute(k, attrs[k]);
  return e;
}

function buildBracket(v){
  const root = el('div', v.rootStyle);

  const head = el('div', 'text-align:center;max-width:820px;margin:0 auto -4%;position:relative;z-index:8;');
  head.appendChild(el('div', v.kickerStyle, v.kicker));
  const h1 = el('h1', v.titleStyle, v.title);
  head.appendChild(h1);
  const hintWrap = el('div', 'text-align:center;');
  const hint = document.createElement('span');
  hint.style.cssText = v.hintStyle;
  hint.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="flex:none;"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>Tap any team or match for details — and the ball for more';
  hintWrap.appendChild(hint);
  head.appendChild(hintWrap);
  root.appendChild(head);

  const stage = el('div', 'position:relative;width:min(94vw,820px);aspect-ratio:1/1;margin:0 auto;');
  stage.id = 'bracket-stage';
  // All positioned content lives on a fixed 820px artboard that fitArtboard()
  // scales to the stage width, so every element (crests, chips, dots, text)
  // shrinks together on narrow screens instead of colliding at full size.
  const art = el('div', 'position:absolute;left:0;top:0;width:820px;height:820px;transform-origin:top left;');
  art.id = 'bracket-art';

  // SVG links layer
  const s = svg('svg', { viewBox:'0 0 1200 1200', preserveAspectRatio:'xMidYMid meet' });
  s.setAttribute('style', 'position:absolute;inset:0;width:100%;height:100%;overflow:visible;');
  const defs = svg('defs');
  const grad = svg('radialGradient', { id:'wcglow', cx:'50%', cy:'50%', r:'50%' });
  grad.appendChild(svg('stop', { offset:'0%',   'stop-color':'rgba(214,176,74,0.30)' }));
  grad.appendChild(svg('stop', { offset:'42%',  'stop-color':'rgba(214,176,74,0.10)' }));
  grad.appendChild(svg('stop', { offset:'100%', 'stop-color':'rgba(214,176,74,0)' }));
  defs.appendChild(grad);
  s.appendChild(defs);
  s.appendChild(svg('circle', { cx:600, cy:600, r:340, fill:'url(#wcglow)' }));
  v.links.forEach(l=>{
    const ln = svg('line', { x1:l.x1, y1:l.y1, x2:l.x2, y2:l.y2, stroke:l.stroke, 'stroke-width':l.w, 'stroke-linecap':'round' });
    if (l.lstyle) ln.setAttribute('style', l.lstyle);
    ln.setAttribute('data-confed', l.confed || '');
    if (l.node) ln.setAttribute('data-node', l.node);
    s.appendChild(ln);
  });
  art.appendChild(s);

  // Center: pulse ring + Trionda-style match ball
  const BALL = 54;
  art.appendChild(el('div', 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:' + BALL + 'px;height:' + BALL + 'px;border-radius:50%;border:1px solid rgba(120,120,120,.32);animation:wcpulse 3.4s ease-out infinite;z-index:4;'));
  const ball = el('div', 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:' + BALL + 'px;height:' + BALL + 'px;border-radius:50%;overflow:hidden;cursor:pointer;background:radial-gradient(circle at 38% 30%, #ffffff, #f4f4f1 60%, #d9d9d4);box-shadow:0 4px 14px rgba(0,0,0,.3), inset 0 2px 5px rgba(255,255,255,.75), inset 0 -6px 10px rgba(0,0,0,.16);z-index:9;transition:transform .15s ease;');
  ball.title = 'Top scorers';
  ball.addEventListener('click', openScorersModal);
  ball.addEventListener('mouseenter', () => { ball.style.transform = 'translate(-50%,-50%) scale(1.12)'; });
  ball.addEventListener('mouseleave', () => { ball.style.transform = 'translate(-50%,-50%)'; });
  const bsvg = svg('svg', { width:BALL, height:BALL, viewBox:'0 0 100 100' });
  bsvg.setAttribute('style', 'display:block;');
  // three curved "onda" blades in the host colours (red / green / blue)
  const blade = 'M50 50 C 40 44 34 20 50 9 C 66 20 60 44 50 50 Z';
  ['#e5322b', '#0a9c53', '#1f6cb0'].forEach((col, i) => {
    bsvg.appendChild(svg('path', { d:blade, fill:col, transform:'rotate(' + (i * 120) + ' 50 50)' }));
  });
  bsvg.appendChild(svg('circle', { cx:50, cy:50, r:6, fill:'#ffffff' }));
  bsvg.appendChild(svg('ellipse', { cx:35, cy:29, rx:12, ry:7, fill:'rgba(255,255,255,.5)' }));
  // Use ball.png if present (drop your own ball photo in), else the stylized SVG.
  const bimg = document.createElement('img');
  bimg.src = 'ball.png'; bimg.alt = '';
  bimg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  bimg.onerror = () => { bimg.remove(); ball.appendChild(bsvg); };
  ball.appendChild(bimg);
  art.appendChild(ball);

  // empty nodes
  v.emptyNodes.forEach(e => stage.appendChild(el('div', e.boxStyle)));
  // status dots
  v.statusDots.forEach(d => stage.appendChild(el('div', d.style)));

  // inner cards (match chips)
  v.innerCards.forEach(c=>{
    const box = el('div', c.boxStyle);
    if (c.soon) box.className = 'match-soon';
    if (c.hasPhase || c.ta || c.tb){
      const showTeams = !!(c.ta || c.tb);
      if (showTeams){
        // flag above each 3-letter code; round label centred, aligned to the codes
        const teamCol = (code, iso) => {
          const col = el('div', 'display:flex;flex-direction:column;align-items:center;gap:2px;');
          if (iso) col.appendChild(flagImg(iso, 15));
          col.appendChild(el('span', c.teamStyle, code));
          return col;
        };
        const head = el('div', 'display:flex;align-items:flex-end;justify-content:center;gap:5px;line-height:1;margin-top:-1px;');
        head.appendChild(teamCol(c.ta || '?', c.taIso));
        if (c.hasPhase){ const ps = el('span', c.phaseStyle, c.phase); ps.style.paddingBottom = '1px'; head.appendChild(ps); }
        head.appendChild(teamCol(c.tb || '?', c.tbIso));
        box.appendChild(head);
      } else if (c.hasPhase){
        const head = el('div', 'line-height:1.12;');
        head.appendChild(el('span', c.phaseStyle, c.phase));
        box.appendChild(head);
      }
    }
    if (c.pens){
      // one compact line so it doesn't cover the crest: score (black) + PENS (green)
      const line = el('div', 'white-space:nowrap;font-size:7px;line-height:1.15;');
      line.appendChild(el('span', c.pensScoreStyle, c.score + ' '));
      line.appendChild(el('span', c.pensStyle, 'Pens' + (c.penScore ? ' (' + c.penScore + ')' : '')));
      box.appendChild(line);
    } else {
      if (c.showScore) box.appendChild(el('div', c.scoreStyle, c.score));
      if (c.showEt)    box.appendChild(el('div', c.etStyle, 'Extra Time'));
    }
    if (c.hasDate)   box.appendChild(el('div', c.dateStyle, c.date));
    if (c.hasTime)   box.appendChild(el('div', c.timeStyle, c.time + ' ' + (c.tzLabel || '')));
    if (c.match){
      box.dataset.match = c.match; box.style.pointerEvents = 'auto'; box.style.cursor = 'pointer'; box.onclick = () => openMatchModal(c.match);
      box.dataset.confed = c.confed || '';
      if (c.elim) box.dataset.elim = '1';   // dims with "show eliminated" off (winner is out)
    }
    art.appendChild(box);
  });

  // labels (team names, when enabled)
  v.labels.forEach(l=>{
    const outer = el('div', l.outer);
    outer.appendChild(el('div', l.inner, l.name));
    art.appendChild(outer);
  });

  // team nodes — flag mode or ring mode
  const addBadge = n => {
    if (!n.statusBadge) return;
    const bg = el('div', n.statusBadge.style, n.statusBadge.sym);
    bg.dataset.confed = confedOf(n.code);   // dims with the confederation filter
    if (n.elim) bg.dataset.elim = '1';      // dims with "show eliminated" off
    art.appendChild(bg);
  };
  if (v.flagMode){
    v.teamNodes.forEach(n=>{
      const box = el('div', n.boxStyle);
      box.title = n.name;
      box.dataset.confed = confedOf(n.code);
      if (n.elim) box.dataset.elim = '1';
      if (n.match){ box.dataset.match = n.match; box.onclick = () => openMatchModal(n.match); }
      else { box.dataset.team = n.code; box.onclick = () => openTeamModal(n.code); }
      const img = document.createElement('img');
      img.src = n.flag; img.alt = n.name; img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;';
      box.appendChild(img);
      box.appendChild(el('span', n.chipStyle, n.code));
      art.appendChild(box);
      addBadge(n);
    });
  } else {
    v.teamNodes.forEach(n=>{
      const box = el('div', n.boxStyle);
      box.title = n.name;
      box.dataset.confed = confedOf(n.code);
      if (n.elim) box.dataset.elim = '1';
      if (n.match){ box.dataset.match = n.match; box.onclick = () => openMatchModal(n.match); }
      else { box.dataset.team = n.code; box.onclick = () => openTeamModal(n.code); }
      const inner = el('div', n.innerStyle);
      inner.appendChild(el('span', n.codeStyle, n.code));
      box.appendChild(inner);
      art.appendChild(box);
      addBadge(n);
    });
  }

  stage.appendChild(art);
  root.appendChild(stage);

  const footer = el('div', v.footerStyle);
  footer.id = 'site-footer';
  // Sit above the bracket: the footer's negative top margin overlaps the stage,
  // which is positioned and would otherwise intercept clicks on the gear/link.
  footer.style.position = 'relative';
  footer.style.zIndex = '10';
  footer.style.display = 'flex';
  footer.style.alignItems = 'center';
  footer.style.justifyContent = 'space-between';
  footer.style.flexWrap = 'wrap';
  footer.style.gap = '10px 16px';
  // The square bracket box reserves ~9.8% of its width as empty space below the
  // circle; pull the footer up into it for a consistent ~26px gap at any width
  // (min(94vw,820px) mirrors the stage width, so it caps with the bracket).
  footer.style.marginTop = 'calc(26px - 0.098 * min(94vw, 820px))';
  footer.style.textTransform = 'none';   // credit reads better in normal case
  footer.style.letterSpacing = 'normal';
  const credit = el('span');
  credit.appendChild(document.createTextNode('Produced with passion by '));
  const link = document.createElement('a');
  link.href = 'https://aguywithascarf.substack.com/';
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.textContent = 'A guy with a scarf';
  link.style.cssText = 'color:inherit;text-decoration:underline;text-underline-offset:2px;';
  credit.appendChild(link);
  credit.appendChild(document.createTextNode(' (Carlo De Marchis) from the original design by Emilio Sansolini '));
  const emilio = document.createElement('a');
  emilio.href = 'https://x.com/EmilioSansolini/status/2072091332483453026';
  emilio.target = '_blank';
  emilio.rel = 'noopener noreferrer';
  emilio.textContent = '(here)';
  emilio.style.cssText = 'color:inherit;text-decoration:underline;text-underline-offset:2px;';
  credit.appendChild(emilio);
  credit.style.cssText = 'flex:1 1 260px;min-width:0;text-align:left;';
  footer.appendChild(credit);

// How far a team has got, for ordering: higher = still in / knocked out later.
// 99 still in · 5 lost Final · 4 SF · 3 QF · 2 R16 · 1 R32 · 0 group stage.
function progressRank(code){
  if (!DATA.groups || !GRP_OF[code]) return -1;
  if (!statusOf(code).through) return 0;                 // didn't get out of the group
  const KO = { R32: 1, R16: 2, QF: 3, SF: 4, F: 5 };

// A team's full match list: 3 group games, then its knockout games (result or upcoming).
function teamMatches(code){
  const g = GRP_OF[code];
  const rows = [];
  (DATA.groups[g].matches || []).forEach((m, mi) => {
    if (m.a !== code && m.b !== code) return;
    const p = m.s.split('–').map(Number), isA = m.a === code;
    const tg = isA ? p[0] : p[1], og = isA ? p[1] : p[0];
    rows.push({ stage: 'GRP', date: m.d, opp: isA ? m.b : m.a, tg, og, result: tg > og ? 'W' : (tg < og ? 'L' : 'D'), upcoming: false, hl: m.h ? ('https://www.youtube.com/watch?v=' + m.h + '&list=PLBRLtDhTHh5o') : null, mid: 'G:' + g + ':' + mi });
  });
  const idx = (DATA.teams || []).findIndex(t => t.code === code);
  if (idx >= 0){
    const side = idx < 16 ? 'R' : 'L', i = idx % 16;
    const SHORT = { 1: 'R32', 2: 'R16', 3: 'QF', 4: 'SF' };
    const subOf = (s, win) => {
      if (s.pens){ let ps = s.penScore || ''; if (ps && !win) ps = ps.split('–').reverse().join('–'); return 'pens' + (ps ? ' ' + ps : ''); }
      return s.et ? 'a.e.t.' : '';
    };
    let reached = true;   // every bracket team plays the R32; then only if it keeps winning
    for (let L = 1; L <= 4 && reached; L++){
      const kL = Math.floor(i / Math.pow(2, L));
      const slot = (L === 1) ? (DATA.r32[side + ':1:' + kL] || {}) : (DATA.schedule[side + ':' + L + ':' + kL] || {});
      const part = matchParticipants(side, L, kL), opp = part[0] === code ? part[1] : part[0];
      if (slot.score){
        const p = slot.score.split('–').map(Number), win = slot.winner === code;
        rows.push({ stage: SHORT[L], date: slot.date, opp, tg: win ? p[0] : p[1], og: win ? p[1] : p[0], result: win ? 'W' : 'L', sub: subOf(slot, win), upcoming: false, hl: slot.highlights || null, mid: side + ':' + L + ':' + kL });
        reached = slot.winner === code;
      } else {
        rows.push({ stage: SHORT[L], opp: opp || null, date: slot.date, time: slot.time, upcoming: true, mid: side + ':' + L + ':' + kL });
        reached = false;
      }
    }
    if (reached){   // won the semi-final → the final (cross-side opponent)
      const f = DATA.final || {}, other = winnerOfNode(side === 'R' ? 'L' : 'R', 4, 0);
      if (f.score){
        const p = f.score.split('–').map(Number), win = f.winner === code;
        rows.push({ stage: 'F', date: f.date, opp: other, tg: win ? p[0] : p[1], og: win ? p[1] : p[0], result: win ? 'W' : 'L', sub: subOf(f, win), upcoming: false, hl: f.highlights || null, mid: 'final' });
      } else {
        rows.push({ stage: 'F', opp: other || null, date: f.date, time: f.time, upcoming: true, mid: 'final' });
      }
    }
  }
  return rows;
}

// A team's players who scored, assisted or were booked — tallied across all its
// matches. Accented/ASCII spellings of a name are merged.
function teamPlayers(code){
  const fold = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '');
  const map = new Map();
  const get = name => {
    const k = fold(name).toLowerCase(); let e = map.get(k);
    if (!e){ e = { name, g: 0, a: 0, y: 0, r: 0 }; map.set(k, e); }
    else if (name !== fold(name) && e.name === fold(e.name)) e.name = name;  // prefer accented
    return e;
  };
  const eatGoals = arr => (arr || []).forEach(x => {
    if (x.t === code && x.p && x.p.indexOf('(o.g.)') < 0){ const e = get(x.p); e.g++; e.id = e.id || x.id; }
    if (x.a && x.t === code){ const e = get(x.a); e.a++; e.id = e.id || x.aid; }
  });
  const eatCards = arr => (arr || []).forEach(x => {
    if (x.t === code && x.p){ const e = get(x.p); if (x.c === 'R') e.r++; else e.y++; e.id = e.id || x.id; }
  });
  Object.values(DATA.groups || {}).forEach(gr => (gr.matches || []).forEach(m => { eatGoals(m.goals); eatCards(m.cards); }));
  Object.values(DATA.r32 || {}).forEach(s => { eatGoals(s.goals); eatCards(s.cards); });
  Object.values(DATA.schedule || {}).forEach(s => { eatGoals(s.goals); eatCards(s.cards); });
  [DATA.final, DATA.thirdPlace].forEach(s => { eatGoals((s || {}).goals); eatCards((s || {}).cards); });
  return [...map.values()].sort((a, b) => b.g - a.g || b.a - a.a || (b.y + b.r) - (a.y + a.r) || a.name.localeCompare(b.name));
}

// Tournament-wide totals, aggregated from every played match.
function computeTotals(){
  const ids = [];
  Object.keys(DATA.groups || {}).sort().forEach(L => (DATA.groups[L].matches || []).forEach((_, i) => ids.push('G:' + L + ':' + i)));
  for (const s of ['R', 'L']) for (let k = 0; k < 8; k++) ids.push(s + ':1:' + k);
  for (const s of ['R', 'L']) for (let k = 0; k < 4; k++) ids.push(s + ':2:' + k);
  for (const s of ['R', 'L']) for (let k = 0; k < 2; k++) ids.push(s + ':3:' + k);
  for (const s of ['R', 'L']) ids.push(s + ':4:0');
  ids.push('third', 'final');
  const T = { n: 0, goals: 0, pens: 0, og: 0, assists: 0, braces: 0, yel: 0, red: 0, mostCards: 0, varc: 0, varm: 0,
    subs: 0, hats: 0, shoot: 0, highest: 0, margin: 0, goalless: 0, clean: 0, etm: 0,
    g1: 0, g2: 0, getr: 0, stopp: 0, fastest: 999, latest: 0,
    attTot: 0, attN: 0, attMax: 0, attMin: Infinity };
  const scorers = new Set(), venues = new Set();
  const baseMin = mm => { const s = (mm || '').replace(/'/g, '').trim(); const b = parseInt(s.split('+')[0], 10); return isNaN(b) ? 999 : b; };
  ids.forEach(id => {
    const m = resolveMatch(id); if (!m || !m.played) return;
    T.n++;
    const ag = +m.aGoals || 0, bg = +m.bGoals || 0, tot = ag + bg;
    T.goals += tot; if (tot > T.highest) T.highest = tot;
    const mg = Math.abs(ag - bg); if (mg > T.margin) T.margin = mg;
    if (tot === 0) T.goalless++;
    if (ag === 0) T.clean++; if (bg === 0) T.clean++;   // a shutout for each side that conceded nothing
    if (m.pens) T.shoot++;
    if (m.et) T.etm++;
    if (m.venue) venues.add(m.venue);
    const cnt = {};
    (m.goals || []).forEach(g => {
      if (g.pen) T.pens++;
      if (g.p && g.p.indexOf('(o.g.)') >= 0){ T.og++; return; }
      if (g.a) T.assists++;
      const bm = baseMin(g.m);
      if (bm <= 45) T.g1++; else if (bm <= 90) T.g2++; else T.getr++;
      if ((g.m || '').indexOf('+') >= 0) T.stopp++;
      if (bm < T.fastest) T.fastest = bm;
      if (bm > T.latest) T.latest = bm;
      if (g.id){ scorers.add(g.id); cnt[g.id] = (cnt[g.id] || 0) + 1; }
    });
    Object.values(cnt).forEach(v => { if (v >= 3) T.hats++; else if (v === 2) T.braces++; });
    let cc = 0;
    (m.cards || []).forEach(c => { cc++; if (c.c === 'R') T.red++; else T.yel++; });
    if (cc > T.mostCards) T.mostCards = cc;
    const vv = (m.var || []).length; T.varc += vv; if (vv) T.varm++;
    Object.values(m.line || {}).forEach(t => { T.subs += (t.subs || []).length; });
    if (m.att){ const a = +m.att; if (a){ T.attTot += a; T.attN++; if (a > T.attMax) T.attMax = a; if (a < T.attMin) T.attMin = a; } }
  });
  T.scorers = scorers.size;
  T.venues = venues.size;
  T.assisted = T.assists;
  T.unassisted = Math.max(0, T.goals - T.og - T.assists);
  T.attAvg = T.attN ? Math.round(T.attTot / T.attN) : 0;
  if (!isFinite(T.attMin)) T.attMin = 0;
  if (T.fastest === 999) T.fastest = 0;
  return T;
}
// Display list of totals, grouped, shared by the Totals tab and the stat bubbles.
function totalsStats(){
  const T = computeTotals(), per = (x) => T.n ? (x / T.n).toFixed(1) : '0', M = (x) => (x / 1e6).toFixed(1) + 'M', L = (x) => x.toLocaleString();
  const pct = (x, base) => base ? Math.round(x / base * 100) + '% of goals' : '';
  const realGoals = T.goals - T.og;   // goals credited to a scorer (own goals excluded)
  return [
    { group: 'Goals & scorers', items: [
      { ic: '⚽', label: 'Goals', val: L(T.goals), sub: per(T.goals) + ' per match' },
      { ic: '🥾', label: 'Assists', val: L(T.assists), sub: pct(T.assists, realGoals) },
      { ic: '🎯', label: 'Penalties', val: T.pens, sub: pct(T.pens, T.goals) },
      { ic: '🔄', label: 'Own goals', val: T.og },
      { ic: '✌️', label: 'Braces', val: T.braces, sub: '2 in a game' },
      { ic: '🎩', label: 'Hat-tricks', val: T.hats },
      { ic: '👟', label: 'Scorers', val: T.scorers, sub: 'different players' } ] },
    { group: 'Goal timing', items: [
      { ic: '🕐', label: 'First-half goals', val: T.g1 },
      { ic: '🕜', label: 'Second-half goals', val: T.g2 },
      { ic: '⏱️', label: 'Stoppage-time goals', val: T.stopp },
      { ic: '⚡', label: 'Fastest goal', val: T.fastest + "'" },
      { ic: '🕛', label: 'Latest goal', val: T.latest + "'" } ] },
    { group: 'Discipline & VAR', items: [
      { ic: '🟨', label: 'Yellow cards', val: L(T.yel), sub: per(T.yel) + ' per match' },
      { ic: '🟥', label: 'Red cards', val: T.red },
      { ic: '🚨', label: 'Most in a match', val: T.mostCards, sub: 'cards' },
      { ic: '📺', label: 'VAR reviews', val: T.varc, sub: T.varm + ' matches' } ] },
    { group: 'Matches & play', items: [
      { ic: '📋', label: 'Matches played', val: T.n },
      { ic: '🔁', label: 'Substitutions', val: L(T.subs), sub: per(T.subs) + ' per match' },
      { ic: '📈', label: 'Biggest win', val: T.margin, sub: 'goal margin' },
      { ic: '🧤', label: 'Clean sheets', val: T.clean, sub: 'shutouts' },
      { ic: '🚫', label: 'Goalless games', val: T.goalless },
      { ic: '⏳', label: 'Extra time', val: T.etm, sub: 'went to ET' },
      { ic: '🥅', label: 'Shootouts', val: T.shoot },
      { ic: '🔥', label: 'Top match', val: T.highest, sub: 'goals in a game' } ] },
    { group: 'The crowd', items: [
      { ic: '👥', label: 'Total attendance', val: M(T.attTot), sub: L(T.attTot) + ' fans' },
      { ic: '📊', label: 'Average crowd', val: L(T.attAvg), sub: 'per match' },
      { ic: '🏟️', label: 'Record crowd', val: L(T.attMax) },
      { ic: '📉', label: 'Lowest crowd', val: L(T.attMin) },
      { ic: '📍', label: 'Venues used', val: T.venues, sub: 'stadiums' } ] }
  ];
}

// Easter egg: click the centre ball for the tournament's top scorers + assists,
// tallied from every stored goal (no extra data needed).
function openScorersModal(){
  if (!DATA) return;
  closeTeamModal();
  const dark = state.bgTheme === 'Dark', accent = state.accentColor;
  const pal = dark
    ? { panel: '#1b1a12', text: '#f4efe2', sub: 'rgba(228,222,206,.6)', line: 'rgba(255,255,255,.12)' }
    : { panel: '#ffffff', text: '#1c1813', sub: 'rgba(70,62,48,.7)', line: 'rgba(0,0,0,.1)' };
  // Walk every played match in tournament order, tallying goals and assists —
  // each with its match context (round, opponent, minute, running + final score,
  // and the linked player: the assister for a goal, the scorer for an assist).
  const gmap = new Map(), amap = new Map(), matches = [], varEvents = [], cardEvents = [];
  // Merge accented ("Mbappé") and ASCII ("Mbappe") spellings of the same player
  // — curated goals keep accents, FIFA-sourced ones don't. Prefer the accented
  // form for display.
  const fold = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '');
  const keyOf = (name, team) => fold(name).toLowerCase() + '|' + team;
  const bestName = (cur, cand) => (cur !== fold(cur)) ? cur : (cand !== fold(cand) ? cand : cur);
  const stageOf = id => id[0] === 'G' ? 'GRP' : id === 'final' ? 'FINAL' : id === 'third' ? '3RD'

// Build the day axis for the top timeline: one entry per distinct match-day, plus
// per-beat (dayIndex, fractional position 0..1) so the ball cursor can glide along.
function computeStoryDays(beats){
  storyDays=[]; storyBeatDay=new Array(beats.length); storyBeatFrac=new Array(beats.length);
  const idxByDate={};
  beats.forEach((b,i)=>{ const d=b.m&&b.m.date; if(d&&!(d in idxByDate)){ idxByDate[d]=storyDays.length; storyDays.push(d); } });
  let cur=0;
  beats.forEach((b,i)=>{ const d=b.m&&b.m.date; if(d!=null&&(d in idxByDate)) cur=idxByDate[d]; storyBeatDay[i]=cur; });
  const total=Math.max(1,storyDays.length), cnt={}, seen={};
  beats.forEach((b,i)=>{ const d=storyBeatDay[i]; cnt[d]=(cnt[d]||0)+1; });
  beats.forEach((b,i)=>{ const d=storyBeatDay[i], j=(seen[d]=(seen[d]||0), seen[d]++), k=cnt[d]; storyBeatFrac[i]=(d+(j+0.5)/k)/total; });
}

// ---- Ambient side-gutter bubbles --------------------------------------------
// One bubble at a time, desktop only, and only when the page is quiet (no
// interaction for a few seconds) with no modal open. Surfaces a random goal
// moment (scorer photo + minute + opponent). Never blocks clicks; pauses the
// moment anything happens.
(function(){
  const mq = q => !!(window.matchMedia && matchMedia(q).matches);   // evaluated live
  const IDLE_MS = 6000;
  let lastActive = 0, pool = null, mi = 0, ti = 0, si = 0, fi = 0, pi = 0, topN = 0, mLeft = 2 + Math.floor(Math.random() * 2), dueKind = null, current = null, nextAt = 0;   // lastActive=0 so load isn't treated as "recent activity" — no idle delay before the opener
  let paused = false, hist = [], hp = -1, belowMode = false, listMode = false, introDone = false;   // belowMode = mobile card under circle; listMode = card is in the ranked board grid; introDone = the 4-card opener has run
  // Preload the big card photos a few ahead so they never pop in empty.
  const PREF = new Set();
  const photoUrl = item => item.pic ? item.pic + '?&io=transform:fit,width:340&quality=86' : null;
  const preload = url => { if (!url || PREF.has(url)) return; PREF.add(url); const im = new Image(); im.decoding = 'async'; im.src = url; };
  function prefetchAhead(){
    if (!pool) return;
    const ml = pool.moments.length, tl = pool.tops.length, fl = (pool.fantasy || []).length, pl = (pool.power || []).length;
    for (let k = 0; k < 4 && ml; k++) preload(photoUrl(pool.moments[(mi + k) % ml]));
    for (let k = 0; k < 2 && tl; k++) preload(photoUrl(pool.tops[(ti + k) % tl]));
    for (let k = 0; k < 2 && fl; k++) preload(photoUrl(pool.fantasy[(fi + k) % fl]));
    for (let k = 0; k < 2 && pl; k++) preload(photoUrl(pool.power[(pi + k) % pl]));
  }
  // Sequence: 2–3 goal/assist cards, then a spotlight slot — a top-scorer/assist
  // card (every 3rd spotlight a stat card) — then one FIFA Fantasy *or* Power
  // card (alternating). Repeat.
  function nextItem(){
    const ml = pool.moments.length, tl = pool.tops.length, sl = pool.stats.length, fl = (pool.fantasy || []).length, pl = (pool.power || []).length;
    if (!ml && !tl && !sl && !fl && !pl) return null;
    if (dueKind === 'fantasy' && fl){ dueKind = null; return pool.fantasy[fi++ % fl]; }
    if (dueKind === 'power' && pl){ dueKind = null; return pool.power[pi++ % pl]; }
    dueKind = null;
    if (mLeft > 0 && ml){ mLeft--; return pool.moments[mi++ % ml]; }
    mLeft = 2 + Math.floor(Math.random() * 2);
    topN++;
    // A fantasy or power card follows each spotlight, alternating between them.
    if (fl && pl) dueKind = (topN % 2 === 0) ? 'power' : 'fantasy';
    else if (fl) dueKind = 'fantasy';
    else if (pl) dueKind = 'power';
    if (sl && topN % 3 === 0) return pool.stats[si++ % sl];
    if (tl) return pool.tops[ti++ % tl];
    if (sl) return pool.stats[si++ % sl];
    return pool.moments[mi++ % ml];
  }
  const poke = () => { lastActive = Date.now(); };
  // Only a click stops the show and restarts the quiet period — mouse moves and
  // key presses are ignored.
  addEventListener('pointerdown', poke, { passive: true });

  function buildPool(){
    const ids = [];
    Object.keys(DATA.groups || {}).sort().forEach(L => (DATA.groups[L].matches || []).forEach((_, i) => ids.push('G:' + L + ':' + i)));
    for (const s of ['R','L']) for (let k = 0; k < 8; k++) ids.push(s + ':1:' + k);
    for (const s of ['R','L']) for (let k = 0; k < 4; k++) ids.push(s + ':2:' + k);
    for (const s of ['R','L']) for (let k = 0; k < 2; k++) ids.push(s + ':3:' + k);
    for (const s of ['R','L']) ids.push(s + ':4:0');
    ids.push('third', 'final');
    const stageName = id => id[0] === 'G' ? 'Group ' + id.split(':')[1] : id === 'final' ? 'Final' : id === 'third' ? '3rd place'
      : ({ '1':'Round of 32', '2':'Round of 16', '3':'Quarter-final', '4':'Semi-final' })[id.split(':')[1]];
    const shortStage = id => id[0] === 'G' ? 'GRP' : id === 'final' ? 'FINAL' : id === 'third' ? '3RD'
      : ({ '1':'R32', '2':'R16', '3':'QF', '4':'SF' })[id.split(':')[1]];
    // How a player featured in this match, from the lineup + subs + red cards.
    const partOf = (m, teamCode, pid) => {
      const line = (m.line || {})[teamCode]; if (!line) return null;
      const started = (line.xi || []).indexOf(pid) >= 0;
      const on = (line.subs || []).find(s => s[0] === pid), off = (line.subs || []).find(s => s[1] === pid);
      const red = (m.cards || []).find(c => c.id === pid && c.c === 'R');
      const onM = on ? on[2] : null, offM = off ? off[2] : null, sent = red ? red.m : null;
      if (sent) return { type: 'sent', txt: (onM ? 'On ' + onM + ' · ' : '') + 'Sent off ' + sent };
      if (onM && offM) return { type: 'sub', txt: 'On ' + onM + ' · Off ' + offM };
      if (onM) return { type: 'sub', txt: 'Subbed on ' + onM };
      if (offM) return { type: 'sub', txt: 'Subbed off ' + offM };
      if (started) return { type: 'full', txt: 'Played the full match' };
      return null;
    };
    // Pre-pass: tournament goal + assist totals per player, and each player's
    // goals + assists within each match.
    const totG = {}, totA = {}, matchStats = {}, goalLog = {}, assistLog = {}, pInfo = {}, aInfo = {};
    ids.forEach(id => {
      const m = resolveMatch(id); if (!m || !m.played) return;
      const ms = matchStats[id] = {}, stg = shortStage(id);
      (m.goals || []).forEach(g => {
        const opp = g.t === m.a ? m.b : m.a;
        if (g.p && g.p.indexOf('(o.g.)') < 0 && g.id){
          totG[g.id] = (totG[g.id] || 0) + 1; (ms[g.id] = ms[g.id] || { g: 0, a: 0 }).g++;
          (goalLog[g.id] = goalLog[g.id] || []).push({ stage: stg, opp, min: g.m, pen: !!g.pen });
          if (!pInfo[g.id]) pInfo[g.id] = { name: g.p, team: g.t };
        }
        if (g.aid){
          totA[g.aid] = (totA[g.aid] || 0) + 1; (ms[g.aid] = ms[g.aid] || { g: 0, a: 0 }).a++;
          (assistLog[g.aid] = assistLog[g.aid] || []).push({ stage: stg, opp, min: g.m, scorer: g.p });
          if (!aInfo[g.aid]) aInfo[g.aid] = { name: g.a, team: g.t };
        }
      });
    });
    const out = [];
    ids.forEach(id => {
      const m = resolveMatch(id); if (!m || !m.played) return;
      const stage = stageName(id), ms = matchStats[id] || {};
      const base = { stage, a: m.a, b: m.b, ag: m.aGoals, bg: m.bGoals, date: m.date, venue: m.venue, hl: m.highlights || null };
      const cnt = { [m.a]: 0, [m.b]: 0 };
      (m.goals || []).forEach(g => {
        if (g.t in cnt) cnt[g.t]++;   // running score (all goals, incl. own goals)
        if (!g.p || g.p.indexOf('(o.g.)') >= 0) return;
        const run = cnt[m.a] + '–' + cnt[m.b];
        const scorerPic = picById(g.id), assistPic = g.aid ? picById(g.aid) : null;
        if (scorerPic){   // a GOAL card, from the scorer's side
          const s = ms[g.id] || { g: 1, a: 0 };
          out.push(Object.assign({}, base, { kind: 'goal', name: g.p, pic: scorerPic, team: g.t, m: g.m, pen: !!g.pen, run,
            part: partOf(m, g.t, g.id), moreG: Math.max(0, s.g - 1), moreA: s.a, total: totG[g.id] || 1,
            linkName: g.a || null, linkPic: assistPic, desc: g.desc || null }));
        }
        if (g.a && assistPic){   // an ASSIST card, from the assister's side
          const s = ms[g.aid] || { g: 0, a: 1 };
          out.push(Object.assign({}, base, { kind: 'assist', name: g.a, pic: assistPic, team: g.t, m: g.m, pen: false, run,
            part: partOf(m, g.t, g.aid), moreG: s.g, moreA: Math.max(0, s.a - 1), total: totA[g.aid] || 1,
            linkName: g.p, linkPic: scorerPic, desc: g.desc || null }));
        }
      });
    });
    // Spotlight cards for every scorer / assister that has a photo. The ambient
    // rotation only uses the 2+ tallies, but the Top Cards board lists them all.
    const allTop = [];
    Object.keys(goalLog).forEach(pid => {
      const pic = picById(pid); if (!pic) return;
      allTop.push({ kind: 'topscorer', id: String(pid), name: pInfo[pid].name, team: pInfo[pid].team, pic, total: goalLog[pid].length, log: goalLog[pid] });
    });
    Object.keys(assistLog).forEach(pid => {
      const pic = picById(pid); if (!pic) return;
      allTop.push({ kind: 'topassist', id: String(pid), name: aInfo[pid].name, team: aInfo[pid].team, pic, total: assistLog[pid].length, log: assistLog[pid] });
    });
    // Rank within each category (competition ranking — equal tallies share a rank).
    ['topscorer', 'topassist'].forEach(kind => {
      const list = allTop.filter(x => x.kind === kind).sort((a, b) => b.total - a.total);
      let rk = 0, prev = null;
      list.forEach((it, i) => { if (it.total !== prev){ rk = i + 1; prev = it.total; } it.rank = rk; });
    });
    const shuffle = arr => { for (let i = arr.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; };
    // Rotation top cards (2+ only): front-load the biggest tallies, then
    // interleave a high and a low one so it opens strong but keeps mixing.
    const topsSorted = shuffle(allTop.filter(x => x.total >= 2)).sort((a, b) => b.total - a.total);
    const half = Math.ceil(topsSorted.length / 2), hi = topsSorted.slice(0, half), lo = topsSorted.slice(half), tops = [];
    for (let i = 0; i < hi.length; i++){ tops.push(hi[i]); if (lo[i]) tops.push(lo[i]); }
    // Stat cards — a subset of the totals, one number at a time.
    const T = computeTotals(), per = x => (x / T.n).toFixed(1);
    const stats = [
      { kind: 'stat', ic: '⚽', big: T.goals, unit: 'goals', sub: per(T.goals) + ' per match', ctx: T.n + ' matches played' },

      { kind: 'stat', ic: '🎯', big: T.pens, unit: 'penalties', sub: 'scored in open play' },

      { kind: 'stat', ic: '👟', big: T.scorers, unit: 'scorers', sub: 'different players on the sheet' },
      { kind: 'stat', ic: '🟨', big: T.yel, unit: 'yellow cards', sub: per(T.yel) + ' per match' },
      { kind: 'stat', ic: '🟥', big: T.red, unit: 'red cards', sub: 'players sent off' },
      { kind: 'stat', ic: '📺', big: T.varc, unit: 'VAR reviews', sub: 'on-field checks' },
      { kind: 'stat', ic: '🔁', big: T.subs.toLocaleString(), unit: 'substitutions', sub: per(T.subs) + ' per match' },
      { kind: 'stat', ic: '👥', big: (T.attTot / 1e6).toFixed(1) + 'M', unit: 'fans', sub: 'total attendance so far' },
      { kind: 'stat', ic: '🏟️', big: T.attMax.toLocaleString(), unit: 'record crowd', sub: 'biggest single gate' }
    ];
    // Fantasy cards need fantasy.json — load it in the background and slot the
    // cards in once it arrives (pool is assigned by the caller before this runs).
    if (!FANTASY_DATA) ensureFantasy().then(() => { if (pool){ pool.fantasy = buildFantasyItems(); prefetchAhead(); } }).catch(() => {});
    if (!POWER_DATA) ensurePower().then(() => { if (pool){ pool.power = buildPowerItems(); prefetchAhead(); } }).catch(() => {});
    // Only goal moment-cards cycle individually; assists are represented by the
    // top-assist spotlight cards (in `tops`), not as single-assist cards.
    return { moments: shuffle(out.filter(x => x.kind === 'goal')), tops, allTop, stats: shuffle(stats), fantasy: buildFantasyItems(), power: buildPowerItems() };
  }

  // Real tournament goals/assists per FIFA person id (for the fantasy cards).
  function goalTally(){
    if (goalTally._c) return goalTally._c;
    const t = {}, add = (id, k) => { if (id == null) return; const s = String(id); (t[s] || (t[s] = { g: 0, a: 0 }))[k]++; };
    const eat = gs => (gs || []).forEach(g => { if (g.p && g.p.indexOf('(o.g.)') >= 0) return; add(g.id, 'g'); add(g.aid, 'a'); });
    Object.values(DATA.groups || {}).forEach(gr => (gr.matches || []).forEach(m => eat(m.goals)));
    Object.values(DATA.r32 || {}).forEach(s => eat(s.goals));
    Object.values(DATA.schedule || {}).forEach(s => eat(s.goals));
    [DATA.final, DATA.thirdPlace].forEach(s => eat((s || {}).goals));
    return goalTally._c = t;
  }
  const POSLONG = { GK: 'goalkeeper', DEF: 'defender', MID: 'midfielder', FWD: 'forward' };
  // Top 100 players by ownership, each with their real WC goals/assists joined in.
  // `rank` is the player's rank *within their position* by ownership (so a card
  // reads e.g. "#1 most-selected midfielder", not their overall position).
  function buildFantasyItems(){
    if (!FANTASY_DATA) return [];
    const tally = goalTally();
    const posRank = {};
    return FANTASY_DATA.players.slice().sort((a, b) => b.o - a.o || b.pts - a.pts).map(p => {
      posRank[p.pos] = (posRank[p.pos] || 0) + 1;
      const ga = tally[String(p.fid)] || { g: 0, a: 0 };
      return { kind: 'fantasy', id: String(p.fid), rank: posRank[p.pos], name: p.n, team: p.t, iso: (FANTASY_DATA.teams[p.t] || {}).iso,
        pic: picById(p.fid), owned: p.o, pts: p.pts, avg: p.avg, price: p.pr, pos: p.pos, st: p.st,
        goals: ga.g, assists: ga.a };
    }).slice(0, 100);
  }

  // Power-ranking spotlight cards: each standout player once, headlining the
  // category they rank highest in (top 15 outfielders per category, top 10 GKs).
  function buildPowerItems(){
    if (!POWER_DATA) return [];
    const of = POWER_DATA.of || [], gk = POWER_DATA.gk || [];
    const rankOf = (arr, key) => { const m = {}; arr.filter(p => p[key] != null).slice().sort((a, b) => b[key] - a[key]).forEach((p, i) => m[p.i] = i + 1); return m; };
    const R = { a: rankOf(of, 'a'), c: rankOf(of, 'c'), d: rankOf(of, 'd') }, LB = { a: 'Attacking', c: 'Creativity', d: 'Defending' };
    const out = of.map(p => {
      let best = null;
      ['a', 'c', 'd'].forEach(k => { const r = R[k][p.i]; if (r && (!best || r < best.rank)) best = { k, rank: r, score: p[k] }; });
      if (!best) return null;
      return { kind: 'power', id: String(p.i), name: p.p, team: p.t, iso: (TEAMDIR[p.t] || {}).iso, pic: p.pic || picById(p.i),
        cat: LB[best.k], lead: best.score, rank: best.rank, gk: false, pills: [['Att', p.a], ['Cre', p.c], ['Def', p.d]] };
    }).filter(x => x && x.rank <= 15);
    const gr = rankOf(gk, 'dg');
    const gks = gk.map(p => ({ kind: 'power', id: String(p.i), name: p.p, team: p.t, iso: (TEAMDIR[p.t] || {}).iso, pic: p.pic || picById(p.i),
      cat: 'Goalkeeper', lead: p.dg, rank: gr[p.i], gk: true, pills: [['Goal', p.dg], ['Poss', p.ip]] }))
      .filter(x => x.lead != null && x.rank <= 10);
    return out.concat(gks);
  }

  // Real drawn extent of the bracket, measured over crest/label-sized elements
  // (so the group-stage "parenthesis" arcs count, but full-width wrappers and the
  // wide title/footer don't). We only ever place bubbles beyond this.
  function contentBounds(){
    const app = document.getElementById('app'); if (!app) return null;
    let L = Infinity, R = -Infinity, T = Infinity, B = -Infinity;
    app.querySelectorAll('*').forEach(elm => {
      const r = elm.getBoundingClientRect();
      if (r.width < 16 || r.width > 200 || r.height < 16 || r.height > 200) return;
      if (r.left < L) L = r.left; if (r.right > R) R = r.right;
      if (r.top < T) T = r.top; if (r.bottom > B) B = r.bottom;
    });
    return isFinite(L) ? { left: L, right: R, top: T, bottom: B } : null;
  }
  function gutter(){
    const c = contentBounds(); if (!c) return null;
    const vw = window.innerWidth, vh = window.innerHeight, pad = 14, edge = 8, minW = 262;
    const cand = [
      { w: c.left - pad - edge, x0: edge },
      { w: vw - c.right - pad - edge, x0: c.right + pad }
    ].filter(g => g.w >= minW);
    if (cand.length) return { mode: 'side', g: cand[Math.floor(Math.random() * cand.length)], top: c.top, bottom: c.bottom };
    // No side room (mobile): drop one card centred below the circle, if it fits.
    const belowTop = c.bottom + 12;
    if (vw >= 320 && vh - belowTop >= 230) return { mode: 'below', vw, vh, belowTop };
    return null;
  }

  // Clicking a board card opens a modal with every card that exists for that same

  // FIFA Power Ranking spotlight — same shape as the Fantasy card, but a
  // light-blue theme with a glow. Headline is the player's best category score.
  function makePower(item, w){

  function dismiss(b){
    if (!b) return;
    clearTimeout(b._t);
    nextAt = Date.now() + 1000;   // short gap before the next one
    const group = [b].concat(b._extra || []);   // intro shows 4 cards as one group
    group.forEach(e => { e.classList.remove('show'); e.classList.add('hide'); });
    setTimeout(() => { group.forEach(e => e.remove()); if (current === b) current = null; }, 750);
  }

  function spawn(item){
    const gt = gutter(); if (!gt || !item) return;
    const w = gt.mode === 'side' ? Math.min(256, gt.g.w - 18) : Math.min(300, gt.vw - 24);
    belowMode = gt.mode === 'below';
    const b = make(item, w);
    document.body.appendChild(b); current = b;   // append first so we can measure height
    let x, y;
    if (gt.mode === 'side'){
      const h = 500;
      x = gt.g.x0 + Math.random() * Math.max(0, gt.g.w - 18 - w);
      const yMin = Math.max(96, gt.top + 16), yMax = Math.min(window.innerHeight - h - 30, gt.bottom - h - 16);
      y = yMin + Math.random() * Math.max(0, yMax - yMin);
    } else {   // centred below the circle; scale to fit so it never rides up over it
      const cardH = b.offsetHeight || 300;
      const avail = gt.vh - gt.belowTop - 12;
      if (cardH > avail) b.style.setProperty('--wc-scale', Math.max(0.7, avail / cardH).toFixed(3));
      x = (gt.vw - w) / 2;
      y = gt.belowTop;   // top anchored just under the circle (transform-origin: top)
    }
    b.style.left = Math.round(x) + 'px'; b.style.top = Math.round(y) + 'px';
    requestAnimationFrame(() => b.classList.add('show'));
    if (!paused) b._t = setTimeout(() => dismiss(b), 15000);   // auto-advance only while running
    prefetchAhead();   // warm the next few cards' photos
  }

  // Forward walks the sequence, keeping a small history so Left can revisit.
  function pickForward(){
    hp++;
    if (hp < hist.length) return hist[hp];
    const it = nextItem(); if (!it){ hp--; return null; }
    hist.push(it); if (hist.length > 60){ hist.shift(); hp--; }
    return it;
  }
  function pickBack(){ if (hp > 0){ hp--; return hist[hp]; } return null; }
  function clearCurrent(){ if (current){ clearTimeout(current._t); [current].concat(current._extra || []).forEach(e => e.remove()); current = null; } }

  // Grand opening: the four category leaders at once — top scorer (top-left),
  // top assister (bottom-left), power #1 (top-right), fantasy #1 (bottom-right) —
  // then the normal one-at-a-time rotation takes over.
  function introItems(){
    if (!pool) return [];
    const ts = (pool.allTop || []).filter(x => x.kind === 'topscorer').sort((a, b) => b.total - a.total)[0];
    const ta = (pool.allTop || []).filter(x => x.kind === 'topassist').sort((a, b) => b.total - a.total)[0];
    const pw = (pool.power || []).slice().sort((a, b) => b.lead - a.lead)[0];
    const fn = (pool.fantasy || [])[0];
    return [ts, ta, pw, fn];
  }
  // Bracket circle extent from the crest/match boxes only — unlike contentBounds
  // it ignores the top-right controls, so both side gutters come out symmetric.
  function bracketBounds(){
    const els = document.querySelectorAll('#app [data-confed], #app [data-elim]');
    if (!els.length) return contentBounds();
    let L = Infinity, R = -Infinity, T = Infinity, B = -Infinity;
    els.forEach(e => { const r = e.getBoundingClientRect(); if (r.width < 8) return; if (r.left < L) L = r.left; if (r.right > R) R = r.right; if (r.top < T) T = r.top; if (r.bottom > B) B = r.bottom; });
    return isFinite(L) ? { left: L, right: R, top: T, bottom: B } : null;
  }
  function spawnIntro(){
    const c = bracketBounds(); if (!c) return false;
    const vw = window.innerWidth, vh = window.innerHeight, pad = 14, edge = 8, minW = 236, gap = 10;
    const leftW = c.left - pad - edge, rightW = vw - c.right - pad - edge;
    if (leftW < minW || rightW < minW) return false;   // needs both side gutters (wide screens)
    const cardW = Math.min(256, leftW - 6, rightW - 6);
    const items = introItems();
    const layout = [
      { it: items[0], side: 'L', slot: 0 }, { it: items[1], side: 'L', slot: 1 },
      { it: items[2], side: 'R', slot: 0 }, { it: items[3], side: 'R', slot: 1 }
    ].filter(q => q.it);
    if (layout.length < 2) return false;
    const yTop = Math.max(92, c.top + 2);
    const availH = Math.min(vh - 12, c.bottom + 46) - yTop, budget = (availH - gap) / 2;
    const leftX = edge + Math.max(0, (leftW - cardW) / 2), rightX = c.right + pad + Math.max(0, (rightW - cardW) / 2);
    const els = [], savedBelow = belowMode; belowMode = false;
    layout.forEach(q => {
      const b = make(q.it, cardW);
      document.body.appendChild(b);
      const h = b.offsetHeight || 320, scale = Math.min(1, budget / h);
      if (scale < 1) b.style.setProperty('--wc-scale', scale.toFixed(3));
      const x = q.side === 'L' ? leftX : rightX, y = yTop + q.slot * (budget + gap);
      b.style.left = Math.round(x) + 'px'; b.style.top = Math.round(y) + 'px';
      requestAnimationFrame(() => b.classList.add('show'));
      els.push(b);
    });
    belowMode = savedBelow;
    current = els[0]; current._extra = els.slice(1);
    if (!paused) current._t = setTimeout(() => dismiss(current), 16000);
    prefetchAhead();
    return true;
  }
  // After the opener the rotation shows a pair — one card in each side gutter,
  // vertically centred on the circle. Falls back to a single card if there isn't
  // room on both sides (narrow screens).
  function spawnPair(dir){
    const pick = (dir < 0) ? pickBack : pickForward;
    const c = bracketBounds(), vw = window.innerWidth, vh = window.innerHeight, pad = 14, edge = 8, minW = 236;
    const leftW = c ? c.left - pad - edge : 0, rightW = c ? vw - c.right - pad - edge : 0;
    if (!c || leftW < minW || rightW < minW){ const it = pick(); if (it) spawn(it); return; }   // narrow: single card
    const cardW = Math.min(256, leftW - 6, rightW - 6);
    const cY = (Math.max(90, c.top) + Math.min(vh, c.bottom)) / 2;   // vertical centre of the circle
    const xs = [edge + Math.max(0, (leftW - cardW) / 2), c.right + pad + Math.max(0, (rightW - cardW) / 2)];
    const els = [], savedBelow = belowMode; belowMode = false;
    xs.forEach(x => {
      const it = pick(); if (!it) return;
      const b = make(it, cardW);
      document.body.appendChild(b);
      const h = b.offsetHeight || 320, scale = Math.min(1, (vh - 24) / h);
      if (scale < 1) b.style.setProperty('--wc-scale', scale.toFixed(3));
      b.style.left = Math.round(x) + 'px';
      b.style.top = Math.round(cY - (h * scale) / 2) + 'px';   // vertically centred
      requestAnimationFrame(() => b.classList.add('show'));
      els.push(b);
    });
    belowMode = savedBelow;
    if (!els.length) return;
    current = els[0]; current._extra = els.slice(1);
    if (!paused) current._t = setTimeout(() => dismiss(current), 15000);
    prefetchAhead();
  }
  function autoNext(){ if (!pool) pool = buildPool(); spawnPair(1); }   // opener fired by kickstart(); rotation shows a left+right pair
  function step(dir){ introDone = true; if (!pool) pool = buildPool(); clearCurrent(); spawnPair(dir); }
  function setPaused(v){
    if (v === paused) return;
    paused = v;
    if (paused){ if (current) clearTimeout(current._t); }
    else { if (current) current._t = setTimeout(() => dismiss(current), 15000); else autoNext(); }
    if (window.__wcbCardsSync) window.__wcbCardsSync();   // keep the footer toggle button in sync
  }
  // Footer buttons drive the same controls as the arrow keys.
  window.wcbCards = { next: () => step(1), prev: () => step(-1),
    toggle: () => setPaused(!paused), isPaused: () => paused,
    openTop: k => openTakeover(k || 'topscorer') };

  // Manual override: → next · ← back · ↓ stop (if running) · ↑ restart (if stopped).
  addEventListener('keydown', e => {
    if (modalEl || /^(INPUT|SELECT|TEXTAREA)$/.test((e.target || {}).tagName || '')) return;
    if (e.key === 'ArrowRight'){ e.preventDefault(); step(1); }
    else if (e.key === 'ArrowLeft'){ e.preventDefault(); step(-1); }
    else if (e.key === 'ArrowDown'){ if (!paused){ e.preventDefault(); setPaused(true); } }
    else if (e.key === 'ArrowUp'){ if (paused){ e.preventDefault(); setPaused(false); } }
  });

  // Build the pool and warm the first cards' photos before the first bubble.
  setTimeout(() => { if (DATA && !pool){ pool = buildPool(); prefetchAhead(); } }, 2500);
  // Fire the 4-card opener as soon as the bracket is drawn and both feeds are
  // loaded — the very first cards don't wait out the idle period.
  function kickstart(){
    if (introDone) return;
    if (!DATA || !document.querySelector('#app [data-confed]')){ setTimeout(kickstart, 150); return; }   // wait for the bracket to draw
    if (paused || document.hidden || modalEl || mq('(prefers-reduced-motion: reduce)')) return;          // the idle loop will pick it up later
    if (!pool){ pool = buildPool(); prefetchAhead(); }
    introDone = true;
    if (!spawnIntro()){ const it = pickForward(); if (it) spawn(it); }
  }
  Promise.all([ensureFantasy().catch(() => {}), ensurePower().catch(() => {})]).then(kickstart);
  setTimeout(kickstart, 1500);   // fallback in case a feed never resolves
  document.addEventListener('visibilitychange', () => { if (!document.hidden) kickstart(); });   // loaded in a background tab? open the moment it's shown
  setInterval(() => {
    if (paused) return;
    if (current){
      if (modalEl || document.hidden || (Date.now() - lastActive) < IDLE_MS) dismiss(current);
      return;
    }
    if (introDone && quiet() && Date.now() >= nextAt) autoNext();   // opener (kickstart) goes first; then normal rotation
  }, 1400);
})();
</script>
</body>
</html>
