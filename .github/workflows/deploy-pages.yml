name: Deploy to GitHub Pages

# Publishes the static site (index.html, data.json, ball.png, …) to GitHub Pages
# via GitHub Actions instead of the legacy branch builder — faster, with real
# build logs. Runs on human pushes to main and on explicit dispatch (the data
# crons dispatch this after they push, since GITHUB_TOKEN pushes don't trigger
# workflows on their own).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Let an in-progress production deploy finish and
# collapse any queued runs to the latest, so overlapping cron/manual pushes
# never race each other.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Stage only the site files — no .git, workflows, updater scripts or docs.
      - name: Stage static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='_site' \
            --exclude='scripts' --exclude='server.py' --exclude='*.md' \
            ./ _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
